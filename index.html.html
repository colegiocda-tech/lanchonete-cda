<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanchonete · Colégio CDA</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   IDENTIDADE VISUAL CDA
   Turquesa: #26B7C9 · Amarelo: #F2C12E · Vermelho: #E63946
   ============================================================ */
:root {
  --turquesa: #26B7C9;
  --turquesa-escuro: #1A8E9D;
  --turquesa-claro: #E8F7F9;
  --amarelo: #F2C12E;
  --amarelo-claro: #FEF6DC;
  --vermelho: #E63946;
  --vermelho-escuro: #C42836;
  --vermelho-claro: #FCE8EA;
  --verde: #10b981;
  --verde-claro: #d1fae5;
  --whatsapp: #25D366;
  --pedra-50: #fafaf9;
  --pedra-100: #f5f5f4;
  --pedra-200: #e7e5e4;
  --pedra-300: #d6d3d1;
  --pedra-500: #78716c;
  --pedra-600: #57534e;
  --pedra-700: #44403c;
  --pedra-900: #1c1917;

  /* GLASSMORPHISM */
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-bg-forte: rgba(255, 255, 255, 0.72);
  --glass-bg-leve: rgba(255, 255, 255, 0.35);
  --glass-borda: rgba(255, 255, 255, 0.7);
  --glass-borda-sutil: rgba(255, 255, 255, 0.4);
  --glass-blur: blur(20px) saturate(160%);
  --glass-blur-forte: blur(32px) saturate(180%);
  --glass-sombra: 0 8px 32px rgba(26, 142, 157, 0.12), inset 0 1px 0 rgba(255,255,255,0.6);
  --glass-sombra-flutuante: 0 16px 48px rgba(26, 142, 157, 0.18), inset 0 1px 0 rgba(255,255,255,0.7);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  color: var(--pedra-900);
  line-height: 1.5;
  min-height: 100vh;
  position: relative;
  background: #eef6f8;
  overflow-x: hidden;
}

/* Fundo atmosférico com blobs orgânicos nas cores CDA */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(ellipse 70% 60% at 8% 12%, rgba(38, 183, 201, 0.35), transparent 60%),
    radial-gradient(ellipse 60% 55% at 92% 18%, rgba(242, 193, 46, 0.28), transparent 55%),
    radial-gradient(ellipse 65% 60% at 80% 88%, rgba(230, 57, 70, 0.18), transparent 55%),
    radial-gradient(ellipse 55% 50% at 18% 92%, rgba(38, 183, 201, 0.25), transparent 55%),
    linear-gradient(160deg, #f0f9fb 0%, #fdfbf3 50%, #fef4f5 100%);
  background-attachment: fixed;
}

/* Camada de blobs animados que flutuam suavemente */
body::after {
  content: '';
  position: fixed;
  inset: -20%;
  z-index: -1;
  background:
    radial-gradient(circle 320px at 25% 30%, rgba(38, 183, 201, 0.22), transparent 70%),
    radial-gradient(circle 280px at 75% 60%, rgba(242, 193, 46, 0.18), transparent 70%);
  filter: blur(40px);
  animation: flutuar 22s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes flutuar {
  0%   { transform: translate(0, 0) scale(1); }
  50%  { transform: translate(4%, -3%) scale(1.08); }
  100% { transform: translate(-3%, 4%) scale(1.02); }
}

@media (prefers-reduced-motion: reduce) {
  body::after { animation: none; }
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }

.serif { font-family: 'Fraunces', Georgia, serif; }

/* utilitários */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.gap-6 { gap: 24px; }
.text-center { text-align: center; }
.w-full { width: 100%; }

/* ============================================================
   LOGO
   ============================================================ */
.logo {
  display: inline-block;
  height: auto;
  max-width: 100%;
}
.logo-sm { height: 40px; }
.logo-md { height: 70px; }
.logo-lg { height: 110px; }
.logo-xl { height: 140px; }

/* ============================================================
   TELA DE LOGIN
   ============================================================ */
.login-bg {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  width: 100%;
  max-width: 440px;
  background: var(--glass-bg-forte);
  backdrop-filter: var(--glass-blur-forte);
  -webkit-backdrop-filter: var(--glass-blur-forte);
  border-radius: 28px;
  padding: 36px 32px;
  box-shadow: var(--glass-sombra-flutuante);
  border: 1px solid var(--glass-borda);
  border-top: 1px solid rgba(255,255,255,0.9);
  position: relative;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  animation: surgir 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}
.login-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(38,183,201,0.5), transparent 40%, transparent 60%, rgba(242,193,46,0.4));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  transition: background 0.4s ease;
}
.login-card.modo-colegio::before {
  background: linear-gradient(135deg, rgba(230,57,70,0.5), transparent 40%, transparent 60%, rgba(242,193,46,0.4));
}

@keyframes surgir {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.login-logo-wrap {
  text-align: center;
  margin-bottom: 18px;
}

.login-titulo {
  text-align: center;
  font-family: 'Fraunces', serif;
  font-size: 30px;
  font-weight: 800;
  color: var(--turquesa-escuro);
  margin-bottom: 4px;
  letter-spacing: -0.02em;
  transition: color 0.3s ease;
}
.modo-colegio .login-titulo { color: var(--vermelho); }

.login-subtitulo {
  text-align: center;
  color: var(--pedra-600);
  font-size: 14px;
  margin-bottom: 24px;
}

/* Switch */
.switch-modo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--glass-borda-sutil);
  border-radius: 16px;
  padding: 5px;
  margin-bottom: 24px;
  position: relative;
}
.switch-modo button {
  padding: 12px 8px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  color: var(--pedra-600);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.switch-modo button.ativo-pai {
  background: rgba(255,255,255,0.85);
  color: var(--turquesa-escuro);
  box-shadow: 0 4px 14px rgba(38,183,201,0.2);
}
.switch-modo button.ativo-colegio {
  background: rgba(255,255,255,0.85);
  color: var(--vermelho);
  box-shadow: 0 4px 14px rgba(230,57,70,0.2);
}

/* Form */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--pedra-500);
  margin-bottom: 6px;
}
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid rgba(255,255,255,0.6);
  border-radius: 14px;
  font-size: 15px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: all 0.25s ease;
  outline: none;
  color: var(--pedra-900);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--pedra-500); }
.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: var(--turquesa);
  background: rgba(255,255,255,0.8);
  box-shadow: 0 0 0 4px rgba(38,183,201,0.12);
}
.form-textarea { resize: vertical; min-height: 70px; }
.input-senha-wrap { position: relative; }
.input-senha-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--pedra-500);
  padding: 4px;
}

/* Botões */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 18px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  text-decoration: none;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: linear-gradient(135deg, var(--turquesa) 0%, var(--turquesa-escuro) 100%);
  color: white;
  box-shadow: 0 6px 18px rgba(38,183,201,0.35);
}
.btn-primary:hover { box-shadow: 0 10px 28px rgba(38,183,201,0.45); }
.btn-vermelho {
  background: linear-gradient(135deg, var(--vermelho) 0%, var(--vermelho-escuro) 100%);
  color: white;
  box-shadow: 0 6px 18px rgba(230,57,70,0.32);
}
.btn-vermelho:hover { box-shadow: 0 10px 28px rgba(230,57,70,0.42); }
.btn-amarelo {
  background: var(--amarelo);
  color: var(--pedra-900);
}
.btn-secondary {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--pedra-700);
  border: 1.5px solid rgba(255,255,255,0.7);
}
.btn-secondary:hover { background: rgba(255,255,255,0.85); }
.btn-success {
  background: linear-gradient(135deg, var(--verde) 0%, #059669 100%);
  color: white;
  box-shadow: 0 6px 18px rgba(16,185,129,0.35);
}
.btn-success:hover { box-shadow: 0 10px 28px rgba(16,185,129,0.45); }
.btn-whatsapp {
  background: var(--whatsapp);
  color: white;
}
.btn-whatsapp:hover { background: #1ebe57; }
.btn-block { display: flex; width: 100%; padding: 14px 18px; }
.btn-sm { padding: 8px 12px; font-size: 13px; }
.btn-icon { padding: 8px; }
.btn-ghost {
  background: transparent;
  color: var(--pedra-600);
}
.btn-ghost:hover { background: var(--pedra-100); }

/* Alerta */
.alert {
  padding: 12px 14px;
  border-radius: 12px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 14px;
  margin-bottom: 12px;
}
.alert-erro {
  background: rgba(252,232,234,0.8);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color: var(--vermelho-escuro);
}
.alert-sucesso {
  background: rgba(209,250,229,0.8);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color: #065f46;
}

/* ============================================================
   APP / DASHBOARD
   ============================================================ */
.app {
  min-height: 100vh;
}
.app-pais {
  min-height: 100vh;
}

.header {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-borda-sutil);
  box-shadow: 0 4px 24px rgba(26,142,157,0.08);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-colegio {
  background: linear-gradient(135deg, rgba(38,183,201,0.88) 0%, rgba(26,142,157,0.92) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid rgba(242,193,46,0.5);
  color: white;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.header-user {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}
.header-user-info { text-align: right; }
.header-user-info small { display: block; font-size: 11px; opacity: 0.7; }
.header-user-info strong { font-weight: 700; }

.tabs {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 2px;
  overflow-x: auto;
}
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--pedra-600);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
.header-colegio .tab { color: rgba(255,255,255,0.78); }
.tab:hover { color: var(--turquesa-escuro); }
.header-colegio .tab:hover { color: white; }
.tab.ativa {
  color: var(--turquesa-escuro);
  border-bottom-color: var(--turquesa);
}
.header-colegio .tab.ativa {
  color: var(--amarelo);
  border-bottom-color: var(--amarelo);
}

.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
}
.main-pais { max-width: 720px; }

.page-titulo {
  font-family: 'Fraunces', serif;
  font-size: 38px;
  font-weight: 800;
  color: var(--turquesa-escuro);
  margin-bottom: 4px;
  letter-spacing: -0.025em;
}
.page-subtitulo {
  color: var(--pedra-600);
  margin-bottom: 28px;
}

/* Progresso */
.progresso {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
}
.progresso-step {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.5);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.progresso-step.ativa {
  background: linear-gradient(90deg, var(--turquesa), var(--turquesa-escuro));
  box-shadow: 0 2px 8px rgba(38,183,201,0.4);
}

/* Cards */
.card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-borda);
  border-top: 1px solid rgba(255,255,255,0.8);
  border-radius: 20px;
  padding: 20px;
  box-shadow: var(--glass-sombra);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.card-clickable { cursor: pointer; text-align: left; width: 100%; }
.card-clickable:hover {
  box-shadow: var(--glass-sombra-flutuante);
  transform: translateY(-3px);
}

.card-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 32px;
}
@media (min-width: 768px) {
  .card-info { grid-template-columns: repeat(5, 1fr); }
}

.kpi {
  border-radius: 20px;
  padding: 18px;
  color: white;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.18);
}
.kpi::after {
  content: '';
  position: absolute;
  top: -50%; right: -30%;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.9;
  margin-bottom: 4px;
}
.kpi-valor {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 800;
  line-height: 1.1;
}
.kpi-icon {
  width: 22px; height: 22px; opacity: 0.85; margin-bottom: 8px;
}
.kpi-stone { background: linear-gradient(135deg, #44403c, #1c1917); }
.kpi-amarelo { background: linear-gradient(135deg, #F2C12E, #d9a91a); color: #6b3410; }
.kpi-turquesa { background: linear-gradient(135deg, var(--turquesa), var(--turquesa-escuro)); }
.kpi-vermelho { background: linear-gradient(135deg, var(--vermelho), var(--vermelho-escuro)); }
.kpi-verde { background: linear-gradient(135deg, #10b981, #059669); }

.grid-2 { display: grid; grid-template-columns: 1fr; gap: 24px; }
@media (min-width: 1024px) { .grid-2 { grid-template-columns: 1fr 1fr; } }

.grid-3 { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media (min-width: 768px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .grid-3 { grid-template-columns: repeat(3, 1fr); } }

/* Aluno button (para selecionar) */
.aluno-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  padding: 14px;
  border-radius: 18px;
  border: 1px solid var(--glass-borda);
  border-top: 1px solid rgba(255,255,255,0.8);
  box-shadow: var(--glass-sombra);
  width: 100%;
  text-align: left;
  margin-bottom: 10px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.aluno-btn:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: var(--glass-sombra-flutuante);
}
.aluno-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--turquesa), var(--turquesa-escuro));
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(38,183,201,0.35);
}
.aluno-nome { font-weight: 700; }
.aluno-meta { font-size: 13px; color: var(--pedra-600); }

/* Produto card */
.produto-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  padding: 14px;
  border-radius: 18px;
  border: 1px solid var(--glass-borda);
  border-top: 1px solid rgba(255,255,255,0.8);
  box-shadow: var(--glass-sombra);
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.produto-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--glass-sombra-flutuante);
}
.produto-emoji { font-size: 36px; display: flex; align-items: center; justify-content: center; }
.produto-info { flex: 1; }
.produto-nome { font-weight: 700; }
.produto-preco { color: var(--verde); font-weight: 700; }

/* Combo destacado */
.produto-combo {
  position: relative;
  background: linear-gradient(135deg, rgba(254,246,220,0.85), rgba(242,193,46,0.18));
  border: 1.5px solid rgba(242,193,46,0.5);
  border-top: 1.5px solid rgba(255,255,255,0.8);
  padding-top: 22px;
  box-shadow: 0 8px 28px rgba(242,193,46,0.18);
}
.produto-combo:hover {
  box-shadow: 0 12px 36px rgba(242,193,46,0.28);
}
.combo-tag {
  position: absolute;
  top: 10px;
  left: 14px;
  background: var(--amarelo);
  color: #7c4a03;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.08em;
  padding: 3px 10px;
  border-radius: 999px;
  box-shadow: 0 2px 6px rgba(242,193,46,0.4);
}
.produto-combo .produto-preco { color: var(--turquesa-escuro); font-size: 17px; }
.combo-desc {
  font-size: 13px;
  color: var(--pedra-600);
  margin: 2px 0 2px;
}

.qtd-controls {
  display: flex; align-items: center; gap: 8px;
}
.qtd-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--pedra-200);
  color: var(--pedra-700);
  font-weight: 800;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.qtd-btn-add {
  background: linear-gradient(135deg, var(--turquesa), var(--turquesa-escuro));
  color: white;
  box-shadow: 0 3px 10px rgba(38,183,201,0.4);
}
.qtd-btn:hover { transform: scale(1.12); }
.qtd-num { font-weight: 800; font-size: 18px; min-width: 24px; text-align: center; }

/* Carrinho fixo */
.cart-bar {
  position: sticky;
  bottom: 16px;
  margin-top: 16px;
  background: linear-gradient(135deg, rgba(16,185,129,0.92), rgba(5,150,105,0.95));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: white;
  padding: 16px 22px;
  border-radius: 20px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 12px 36px rgba(16,185,129,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  border: 1px solid rgba(255,255,255,0.25);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  animation: pulsar-entrada 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.cart-bar:hover { transform: translateY(-3px); box-shadow: 0 16px 44px rgba(16,185,129,0.5), inset 0 1px 0 rgba(255,255,255,0.3); }
.cart-bar-total { color: var(--amarelo); }
@keyframes pulsar-entrada {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Resumo aluno (header) */
.resumo-aluno {
  background: linear-gradient(135deg, rgba(38,183,201,0.9), rgba(26,142,157,0.95));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: white;
  padding: 16px 18px;
  border-radius: 18px;
  margin-bottom: 20px;
  box-shadow: 0 8px 24px rgba(38,183,201,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.2);
}
.resumo-aluno-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.9;
}
.resumo-aluno-nome {
  font-size: 20px;
  font-weight: 800;
  font-family: 'Fraunces', serif;
}

/* Lista de itens */
.itens-lista { padding: 0; }
.item-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.item-row:last-child { border-bottom: none; }
.total-row {
  display: flex;
  justify-content: space-between;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1.5px solid rgba(0,0,0,0.1);
  font-weight: 800;
}
.total-valor {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  color: var(--verde);
}

/* Toggle pagamento */
.toggle-grupo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.toggle-opcao {
  padding: 14px;
  border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.6);
  font-weight: 700;
  color: var(--pedra-600);
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: all 0.25s ease;
}
.toggle-opcao.ativo {
  border-color: var(--turquesa);
  background: rgba(38,183,201,0.15);
  color: var(--turquesa-escuro);
  box-shadow: 0 0 0 3px rgba(38,183,201,0.1);
}

/* Sucesso */
.sucesso-card {
  background: var(--glass-bg-forte);
  backdrop-filter: var(--glass-blur-forte);
  -webkit-backdrop-filter: var(--glass-blur-forte);
  border: 1px solid rgba(16,185,129,0.4);
  border-top: 1px solid rgba(255,255,255,0.8);
  border-radius: 24px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 16px;
  box-shadow: 0 12px 40px rgba(16,185,129,0.2), inset 0 1px 0 rgba(255,255,255,0.6);
  animation: surgir 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.sucesso-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--verde-claro), #a7f3d0);
  color: var(--verde);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
  box-shadow: 0 8px 20px rgba(16,185,129,0.3);
  animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
}
.sucesso-icon svg { width: 40px; height: 40px; }
@keyframes pop {
  from { transform: scale(0); }
  to   { transform: scale(1); }
}

.pix-card {
  background: linear-gradient(135deg, rgba(38,183,201,0.92), rgba(26,142,157,0.95));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: white;
  padding: 22px;
  border-radius: 20px;
  margin-bottom: 12px;
  box-shadow: 0 10px 30px rgba(38,183,201,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.2);
}
.pix-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 700;
  color: var(--amarelo);
  margin-bottom: 6px;
}
.pix-valor {
  font-family: 'Fraunces', serif;
  font-size: 32px;
  font-weight: 800;
}
.pix-nome { font-size: 14px; opacity: 0.9; margin-bottom: 14px; }
.pix-chave-box {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
.pix-chave-label { font-size: 11px; opacity: 0.8; margin-bottom: 4px; }
.pix-chave-valor {
  font-family: monospace;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.pix-chave-copy {
  color: white;
  padding: 6px;
  border-radius: 6px;
  display: flex;
  align-items: center;
}
.pix-chave-copy:hover { background: rgba(255,255,255,0.15); }

/* Tabela */
.tabela-wrap {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-borda);
  border-top: 1px solid rgba(255,255,255,0.8);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--glass-sombra);
}
.tabela {
  width: 100%;
  border-collapse: collapse;
}
.tabela thead {
  background: rgba(255,255,255,0.4);
}
.tabela th {
  text-align: left;
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--pedra-600);
}
.tabela td {
  padding: 14px;
  border-top: 1px solid rgba(0,0,0,0.05);
  font-size: 14px;
}
.tabela tbody tr:hover { background: rgba(255,255,255,0.45); }
.tabela .text-right { text-align: right; }
.tabela .num { font-weight: 700; color: var(--pedra-900); }
.tabela .vermelho { color: var(--verde); font-weight: 700; }

/* Badge */
.badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
}
.badge-pendente { background: var(--vermelho-claro); color: var(--vermelho-escuro); }
.badge-pago { background: var(--verde-claro); color: #065f46; }
.badge-reservado { background: var(--amarelo-claro); color: #92400e; }
.badge-entregue { background: var(--pedra-200); color: var(--pedra-700); }
.badge-cancelado { background: var(--pedra-100); color: var(--pedra-500); text-decoration: line-through; }

/* Pedido card (lanchonete e pais) */
.pedido-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-borda);
  border-top: 1px solid rgba(255,255,255,0.75);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: var(--glass-sombra);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.pedido-card:hover { transform: translateY(-2px); box-shadow: var(--glass-sombra-flutuante); }
.pedido-card.entregue { background: rgba(209,250,229,0.6); border-color: rgba(110,231,183,0.6); opacity: 0.75; }
.pedido-card.cancelado { background: rgba(245,245,244,0.6); border-color: var(--pedra-200); opacity: 0.6; }

.pedido-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}
.pedido-aluno-nome { font-weight: 700; color: var(--pedra-900); }
.pedido-meta { font-size: 12px; color: var(--pedra-500); }
.pedido-badges {
  display: flex; flex-direction: column; gap: 4px; align-items: flex-end;
}
.pedido-itens { font-size: 13px; color: var(--pedra-700); margin-bottom: 8px; }
.pedido-obs {
  font-size: 12px;
  background: var(--amarelo-claro);
  color: #92400e;
  padding: 6px 8px;
  border-radius: 6px;
  margin-bottom: 8px;
}
.pedido-obs-medica {
  background: var(--vermelho-claro);
  color: var(--vermelho-escuro);
  border: 1px solid var(--vermelho);
  font-weight: 700;
}
.pedido-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}
.pedido-acoes { display: flex; gap: 4px; }

/* Filtros */
.filtros { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filtro-btn {
  padding: 8px 14px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 13px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--glass-borda-sutil);
  color: var(--pedra-600);
  transition: all 0.25s ease;
}
.filtro-btn.ativo {
  background: linear-gradient(135deg, var(--turquesa), var(--turquesa-escuro));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(38,183,201,0.3);
}

/* Pagamentos pendentes total */
.pendente-total {
  background: linear-gradient(135deg, rgba(252,232,234,0.7), rgba(255,255,255,0.5));
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid rgba(230,57,70,0.35);
  border-top: 1px solid rgba(255,255,255,0.7);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 8px 28px rgba(230,57,70,0.12);
}
.pendente-total svg { color: var(--vermelho); width: 32px; height: 32px; flex-shrink: 0; }
.pendente-total-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  font-weight: 700; color: var(--vermelho-escuro);
}
.pendente-total-valor {
  font-family: 'Fraunces', serif; font-size: 28px; font-weight: 800; color: var(--vermelho-escuro);
}

/* Bar de barra (mais vendidos) */
.barra-item { margin-bottom: 12px; }
.barra-info {
  display: flex; justify-content: space-between;
  font-size: 13px; margin-bottom: 4px;
}
.barra-bar {
  height: 8px;
  background: rgba(0,0,0,0.06);
  border-radius: 4px;
  overflow: hidden;
}
.barra-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amarelo), #d9a91a);
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Empty state */
.empty {
  text-align: center;
  padding: 48px 24px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1.5px dashed rgba(38,183,201,0.3);
  border-radius: 20px;
  color: var(--pedra-600);
}
.empty-icon { width: 48px; height: 48px; color: var(--turquesa); opacity: 0.4; margin: 0 auto 12px; }

/* Modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(26, 60, 66, 0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 100;
  animation: fadeIn 0.25s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--glass-bg-forte);
  backdrop-filter: var(--glass-blur-forte);
  -webkit-backdrop-filter: var(--glass-blur-forte);
  border: 1px solid var(--glass-borda);
  border-top: 1px solid rgba(255,255,255,0.9);
  border-radius: 24px;
  padding: 28px;
  max-width: 540px;
  width: 100%;
  box-shadow: 0 24px 64px rgba(26,142,157,0.25), inset 0 1px 0 rgba(255,255,255,0.6);
  animation: surgir 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-titulo {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 4px;
}
.modal-subtitulo {
  color: var(--pedra-500);
  margin-bottom: 18px;
  font-size: 14px;
}
.modal-acoes {
  display: flex; gap: 8px; margin-top: 18px;
}
.modal-acoes .btn { flex: 1; }

/* Tags pequenas (alergia etc) */
.tag-medica {
  display: inline-block;
  font-size: 11px;
  background: var(--vermelho-claro);
  color: var(--vermelho-escuro);
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 600;
  margin-top: 4px;
}

/* Buscar */
.search-box { position: relative; margin-bottom: 16px; }
.search-box svg {
  position: absolute;
  left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--pedra-500);
  width: 18px; height: 18px;
}
.search-box input {
  padding-left: 42px !important;
}

/* Avisos no topo */
.aviso {
  background: linear-gradient(135deg, rgba(254,246,220,0.8), rgba(255,255,255,0.5));
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(242,193,46,0.5);
  border-top: 1px solid rgba(255,255,255,0.7);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 16px;
  font-size: 13px;
  color: #78350f;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(242,193,46,0.12);
}

/* Aviso leve de antecedência (lembrete suave, sempre visível) */
.aviso-leve {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(38,183,201,0.08);
  border: 1px solid rgba(38,183,201,0.25);
  border-radius: 14px;
  padding: 11px 14px;
  margin-bottom: 18px;
  font-size: 13px;
  color: var(--turquesa-escuro);
}
.aviso-leve svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.8; }

/* Aviso crítico de antecedência (janela final, destacado) */
.aviso-critico {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: linear-gradient(135deg, rgba(230,57,70,0.12), rgba(242,193,46,0.12));
  border: 1.5px solid rgba(230,57,70,0.4);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 18px;
  font-size: 14px;
  color: var(--vermelho-escuro);
  line-height: 1.45;
  box-shadow: 0 6px 20px rgba(230,57,70,0.15);
  animation: pulso-aviso 2s ease-in-out infinite;
}
.aviso-critico svg { width: 24px; height: 24px; flex-shrink: 0; color: var(--vermelho); margin-top: 1px; }
.aviso-critico strong { display: block; margin-bottom: 2px; }
@keyframes pulso-aviso {
  0%, 100% { box-shadow: 0 6px 20px rgba(230,57,70,0.15); }
  50% { box-shadow: 0 6px 28px rgba(230,57,70,0.3); }
}
@media (prefers-reduced-motion: reduce) {
  .aviso-critico { animation: none; }
}
@media (max-width: 768px) {
  /* Tipografia */
  .page-titulo { font-size: 26px; }
  .page-subtitulo { font-size: 14px; margin-bottom: 20px; }
  .login-card { padding: 28px 22px; }
  .pix-valor { font-size: 26px; }

  /* Main / padding geral */
  .main { padding: 20px 14px; }

  /* Header (admin) - mais compacto */
  .header-inner {
    padding: 10px 14px;
    gap: 8px;
  }
  .header-colegio .header-inner > div:first-child > div:last-child > div:first-child {
    font-size: 10px;
  }
  .header-colegio .header-inner > div:first-child > div:last-child > div:last-child {
    font-size: 14px;
  }
  .header-user {
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .header-user > small {
    font-size: 11px !important;
  }
  .header-user .btn { padding: 6px 10px; font-size: 12px; }

  /* Tabs - barra horizontal scrollável */
  .tabs {
    padding: 0 14px;
    gap: 0;
  }
  .tab {
    padding: 10px 12px;
    font-size: 13px;
    gap: 4px;
  }
  .tab svg { width: 16px; height: 16px; }

  /* KPIs em grid 2x2 */
  .card-info {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px;
    margin-bottom: 20px;
  }
  .kpi {
    padding: 14px;
    border-radius: 14px;
  }
  .kpi-valor { font-size: 22px; }
  .kpi-label { font-size: 10px; }

  /* Grid 2 colunas vira 1 */
  .grid-2 { gap: 16px; }
  .grid-3 { gap: 12px; }

  /* Cards mais finos */
  .card { padding: 16px; border-radius: 14px; }

  /* Filtros - permitir wrap */
  .filtros {
    gap: 6px;
    margin-bottom: 16px;
  }
  .filtro-btn {
    padding: 8px 12px;
    font-size: 12px;
    flex: 1;
    min-width: 0;
  }

  /* Botão "Novo X" + título no admin: empilhar */
  .main > div:first-child[style*="flex"] {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 12px !important;
  }
  .main > div:first-child[style*="flex"] .btn {
    width: 100%;
  }

  /* TABELAS → vira lista de cards no mobile */
  .tabela-wrap { border-radius: 14px; }
  .tabela thead { display: none; }
  .tabela, .tabela tbody, .tabela tr, .tabela td {
    display: block;
    width: 100%;
  }
  .tabela tr {
    padding: 14px;
    border-top: 1px solid var(--pedra-100);
    background: white;
  }
  .tabela tr:first-child { border-top: none; }
  .tabela tr:hover { background: white; }
  .tabela td {
    padding: 4px 0;
    border: none;
    text-align: left !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  /* Primeiro td (nome): destaque */
  .tabela td:first-child {
    border-bottom: 1px solid var(--pedra-100);
    padding-bottom: 8px;
    margin-bottom: 8px;
    flex-direction: column;
    align-items: flex-start;
  }
  /* Linha de números: rótulo aparece como ::before */
  .tabela td[data-label]::before {
    content: attr(data-label);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--pedra-500);
    font-weight: 600;
  }
  /* Última coluna (botões): full width abaixo */
  .tabela td:last-child {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--pedra-100);
    justify-content: flex-end;
    gap: 6px;
  }

  /* Pedido card - mais compacto */
  .pedido-header {
    flex-direction: column;
    gap: 6px;
  }
  .pedido-badges {
    flex-direction: row;
    flex-wrap: wrap;
  }

  /* Pagamentos: layout vertical */
  .tabela-wrap > div[style*="display:flex"] {
    flex-direction: column !important;
    align-items: stretch !important;
    padding: 14px !important;
    gap: 12px !important;
  }
  .tabela-wrap > div[style*="display:flex"] > div:first-child { min-width: 0 !important; }
  .tabela-wrap > div[style*="display:flex"] > div:nth-child(2) {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Modais - fullscreen no mobile */
  .modal-bg { padding: 0; }
  .modal {
    border-radius: 0;
    max-width: 100%;
    min-height: 100vh;
    padding: 24px 20px;
  }

  /* Form em modais: grid de produto vira coluna */
  .modal form > div[style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }

  /* Pendente total */
  .pendente-total {
    padding: 14px;
    gap: 10px;
  }
  .pendente-total svg { width: 24px; height: 24px; }
  .pendente-total-valor { font-size: 22px; }

  /* Buttons gerais */
  .btn-block { padding: 13px 16px; }
}

/* ============================================================
   RESPONSIVO - TABLET (769px a 1024px)
   ============================================================ */
@media (min-width: 769px) and (max-width: 1024px) {
  .main { padding: 24px 18px; }
  .grid-2 { grid-template-columns: 1fr; }
}

/* ============================================================
   ANIMAÇÕES DE ENTRADA (load orquestrado)
   ============================================================ */
.main > .page-titulo,
.main > h1.page-titulo {
  animation: entrar-cima 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.page-subtitulo {
  animation: entrar-cima 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.06s both;
}
.card-info {
  animation: entrar-cima 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.12s both;
}
.grid-2, .grid-3, .tabela-wrap, .filtros {
  animation: entrar-cima 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.18s both;
}

@keyframes entrar-cima {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Cards de produto e aluno entram em cascata */
.produto-card { animation: entrar-cima 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
.produto-card:nth-child(1) { animation-delay: 0.04s; }
.produto-card:nth-child(2) { animation-delay: 0.08s; }
.produto-card:nth-child(3) { animation-delay: 0.12s; }
.produto-card:nth-child(4) { animation-delay: 0.16s; }
.produto-card:nth-child(5) { animation-delay: 0.20s; }
.produto-card:nth-child(6) { animation-delay: 0.24s; }
.aluno-btn { animation: entrar-cima 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }

@media (prefers-reduced-motion: reduce) {
  .main > .page-titulo, .page-subtitulo, .card-info, .grid-2, .grid-3,
  .tabela-wrap, .filtros, .produto-card, .aluno-btn {
    animation: none;
  }
}

/* ============================================================
   CALENDÁRIO RESPONSIVO
   ============================================================ */
.cal-desktop { display: block; }
.cal-mobile { display: none; }

.cal-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-borda);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--glass-sombra);
}
.cal-card-vazio { border-color: rgba(230,57,70,0.35); }
.cal-card-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.cal-dias {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.cal-pilula {
  padding: 12px 4px;
  border-radius: 12px;
  border: 1.5px solid var(--pedra-200);
  background: var(--pedra-50);
  color: var(--pedra-500);
  font-weight: 700;
  font-size: 13px;
  transition: all 0.2s;
  position: relative;
}
.cal-pilula.on {
  background: linear-gradient(135deg, var(--turquesa), var(--turquesa-escuro));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 12px rgba(38,183,201,0.3);
}
.cal-pilula.hoje::after {
  content: '•';
  position: absolute;
  top: 2px;
  right: 6px;
  color: var(--amarelo);
  font-size: 16px;
  line-height: 1;
}
.cal-pilula.on.hoje::after { color: white; }

@media (max-width: 700px) {
  .cal-desktop { display: none; }
  .cal-mobile { display: block; }
}
</style>

let db = null;

function inicializarSupabase() {
  if (!CONFIG.SUPABASE_URL || CONFIG.SUPABASE_URL.startsWith('COLE_AQUI')) {
    alert('⚠️ Sistema não configurado!\n\nAbra o arquivo HTML em um editor de texto e cole as credenciais do Supabase no início do arquivo (procure por "COLE_AQUI").');
    return false;
  }
  try {
    db = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    return true;
  } catch (e) {
    alert('Erro ao conectar ao banco de dados: ' + e.message);
    return false;
  }
}

// Converte registro do banco (snake_case) para o formato que a UI espera (camelCase)
function fromDBPai(p) {
  return {
    id: p.id, nome: p.nome, usuario: p.usuario, email: p.email,
    telefone: p.telefone, senhaHash: p.senha_hash, criadoEm: p.criado_em,
    senhaTemporaria: p.senha_temporaria !== false, // default true se a coluna não existir ainda
    authUserId: p.auth_user_id || null // vínculo com a conta do Supabase Auth
  };
}
function fromDBAluno(a) {
  return {
    id: a.id, nome: a.nome, turma: a.turma,
    responsavelId: a.responsavel_id, observacoesMedicas: a.observacoes_medicas,
    criadoEm: a.criado_em
  };
}
function fromDBProduto(p) {
  return {
    id: p.id, nome: p.nome, preco: parseFloat(p.preco),
    emoji: p.emoji, ativo: p.ativo, criadoEm: p.criado_em,
    ehCombo: p.eh_combo === true,
    comboDescricao: p.combo_descricao || null,
    // dias da semana em que o produto está disponível (1=seg ... 5=sex)
    // null ou vazio = disponível todos os dias (fallback seguro)
    dias: Array.isArray(p.dias_disponiveis) ? p.dias_disponiveis : null
  };
}
function fromDBPedido(p) {
  return {
    id: p.id, alunoId: p.aluno_id, paiId: p.pai_id, data: p.data,
    itens: p.itens, total: parseFloat(p.total), observacao: p.observacao,
    metodoPagamento: p.metodo_pagamento, statusPagamento: p.status_pagamento,
    statusEntrega: p.status_entrega, criadoEm: p.criado_em
  };
}

// Carrega TUDO do banco (chamado no startup e quando precisa atualizar)
async function carregarTudo() {
  if (!db) return;
  try {
    State.carregando = true;
    const [paisRes, alunosRes, produtosRes, pedidosRes] = await Promise.all([
      db.from('pais').select('*').order('nome'),
      db.from('alunos').select('*').order('nome'),
      db.from('produtos').select('*').order('criado_em'),
      db.from('pedidos').select('*').order('criado_em', { ascending: false })
    ]);

    if (paisRes.error) throw paisRes.error;
    if (alunosRes.error) throw alunosRes.error;
    if (produtosRes.error) throw produtosRes.error;
    if (pedidosRes.error) throw pedidosRes.error;

    State.pais = (paisRes.data || []).map(fromDBPai);
    State.alunos = (alunosRes.data || []).map(fromDBAluno);
    State.produtos = (produtosRes.data || []).map(fromDBProduto);
    State.pedidos = (pedidosRes.data || []).map(fromDBPedido);
    // Senha admin vem do código (CONFIG), não do banco
    State.senhaAdminHash = CONFIG.SENHA_ADMIN_HASH;
    State.carregando = false;
  } catch (e) {
    console.error('Erro ao carregar dados:', e);
    State.carregando = false;
    alert('Erro ao carregar dados do banco: ' + e.message);
  }
}

// Carrega apenas os dados relevantes para o pai logado via Auth.
// Com RLS ativo, o banco filtra automaticamente — o pai só recebe
// seus próprios filhos e pedidos. Mais seguro e mais rápido que carregarTudo.
async function carregarDadosPai(authUserId) {
  if (!db) return;
  try {
    State.carregando = true;

    // Produtos e pedidos: o pai precisa ver todos os produtos disponíveis
    // e só os próprios pedidos. Com RLS, o banco cuida do filtro de pedidos.
    const [paiRes, alunosRes, produtosRes, pedidosRes] = await Promise.all([
      db.from('pais').select('*').eq('auth_user_id', authUserId).single(),
      db.from('alunos').select('*').order('nome'),
      db.from('produtos').select('*').order('criado_em'),
      db.from('pedidos').select('*').order('criado_em', { ascending: false })
    ]);

    if (paiRes.error) throw paiRes.error;
    if (alunosRes.error) throw alunosRes.error;
    if (produtosRes.error) throw produtosRes.error;
    if (pedidosRes.error) throw pedidosRes.error;

    const pai = fromDBPai(paiRes.data);
    // State.pais mantém só o pai logado (não expõe todos os responsáveis)
    State.pais = [pai];
    State.alunos = (alunosRes.data || []).map(fromDBAluno);
    State.produtos = (produtosRes.data || []).map(fromDBProduto);
    State.pedidos = (pedidosRes.data || []).map(fromDBPedido);
    State.carregando = false;
    return pai;
  } catch (e) {
    console.error('Erro ao carregar dados do pai:', e);
    State.carregando = false;
    throw e;
  }
}

// D: som curto de notificação (dois tons), gerado pelo navegador, sem arquivo externo
function tocarSomNovoPedido() {
  try {
    const ctx = window._audioCtx || (window._audioCtx = new (window.AudioContext || window.webkitAudioContext)());
    if (ctx.state === 'suspended') ctx.resume();
    const agora = ctx.currentTime;
    [[880, 0], [1174.66, 0.12]].forEach(([freq, t]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, agora + t);
      gain.gain.exponentialRampToValueAtTime(0.18, agora + t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, agora + t + 0.25);
      osc.connect(gain).connect(ctx.destination);
      osc.start(agora + t);
      osc.stop(agora + t + 0.3);
    });
  } catch (e) { /* som é opcional; se o navegador bloquear, segue sem */ }
}

// Configura listener em tempo real para sincronização entre dispositivos
function ativarRealtime() {
  if (!db) return;

  // D: aviso imediato (toast + som) quando um NOVO pedido chega, para o admin
  db.channel('novo-pedido-alerta')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pedidos' }, () => {
      if (State.sessao?.tipo === 'admin') {
        tocarSomNovoPedido();
        mostrarToast('🔔 Novo pedido recebido!');
      }
    })
    .subscribe();

  ['pais', 'alunos', 'produtos', 'pedidos'].forEach(tabela => {
    db.channel('public:' + tabela)
      .on('postgres_changes', { event: '*', schema: 'public', table: tabela }, async () => {
        await carregarTudo();
        // Se há um modal aberto (admin editando algo) ou o pai está no meio de um
        // pedido, NÃO re-renderiza agora para não atrapalhar/duplicar a tela.
        // Marca que há atualização pendente e aplica quando for seguro.
        if (State.modalAberto || (State.sessao?.tipo === 'pai' && State.pedidoEtapa !== 'aluno' && State.pedidoEtapa !== 'sucesso')) {
          State.atualizacaoPendente = true;
          return;
        }
        render();
      })
      .subscribe();
  });
}

// Data de hoje no fuso LOCAL do navegador (YYYY-MM-DD).

// retornaria o dia seguinte, desalinhando dos pedidos e do calendário (getDay).
const HOJE = () => {
  const d = new Date();
  const ano = d.getFullYear();
  const mes = String(d.getMonth() + 1).padStart(2, '0');
  const dia = String(d.getDate()).padStart(2, '0');
  return `${ano}-${mes}-${dia}`;
};

const formatData = iso => {
  if (!iso) return '';

};

const formatHora = iso => {

/* ============================================================
   CALENDÁRIO SEMANAL
   ============================================================ */
// Dias úteis: 1=segunda ... 5=sexta (igual ao getDay do JS, exceto domingo=0)
const DIAS_SEMANA = [
  { num: 1, nome: 'Segunda', curto: 'Seg' },
  { num: 2, nome: 'Terça', curto: 'Ter' },
  { num: 3, nome: 'Quarta', curto: 'Qua' },
  { num: 4, nome: 'Quinta', curto: 'Qui' },
  { num: 5, nome: 'Sexta', curto: 'Sex' },
];

// Número do dia de hoje (1=seg ... 5=sex); fim de semana retorna null
function diaDaSemanaHoje() {
  const d = new Date().getDay(); // 0=dom, 6=sáb
  return (d >= 1 && d <= 5) ? d : null;
}

// Um produto está disponível em determinado dia?
// Regra: sem nenhum dia marcado = NÃO aparece (o admin controla o que mostra).
function produtoDisponivelNoDia(produto, dia) {
  if (!produto.dias || produto.dias.length === 0) return false;
  return produto.dias.includes(dia);
}

// Produtos ativos disponíveis hoje (aplica o calendário)
function produtosDeHoje() {
  const dia = diaDaSemanaHoje();
  const ativos = State.produtos.filter(p => p.ativo);
  if (dia === null) return ativos; // fim de semana: não filtra
  return ativos.filter(p => produtoDisponivelNoDia(p, dia));
}

/* ============================================================
   AVISO DE ANTECEDÊNCIA (não bloqueia, só avisa)
   ============================================================ */
// Horários dos intervalos e o limite de antecedência (30 min antes)
const INTERVALOS = [
  { nome: 'manhã', intervaloMin: 9 * 60,  limiteMin: 8 * 60 + 30 },  // intervalo 9h, limite 8h30
  { nome: 'tarde', intervaloMin: 15 * 60, limiteMin: 14 * 60 + 30 }, // intervalo 15h, limite 14h30
];

// Retorna o estado do aviso conforme a hora atual:
//  { nivel: 'critico', turno: 'manhã' }  -> dentro da janela final (limite até intervalo)
//  { nivel: 'leve' }                      -> fora da janela, lembrete suave
function estadoAvisoAntecedencia() {
  const agora = new Date();
  const minutosAgora = agora.getHours() * 60 + agora.getMinutes();
  // Está dentro de alguma janela crítica? (entre o limite e o horário do intervalo)
  for (const it of INTERVALOS) {
    if (minutosAgora >= it.limiteMin && minutosAgora < it.intervaloMin) {
      return { nivel: 'critico', turno: it.nome };
    }
  }
  return { nivel: 'leve' };
}

// HTML do aviso para mostrar no cardápio do pai
function htmlAvisoAntecedencia() {
  const estado = estadoAvisoAntecedencia();
  if (estado.nivel === 'critico') {
    return `
      <div class="aviso-critico">
        ${Icons.alert}
        <div>
          <strong>Faltam poucos minutos para o intervalo da ${estado.turno}!</strong>
          Peça agora para dar tempo de preparar e entregar o lanche no horário do recreio.
        </div>
      </div>
    `;
  }
  return `
    <div class="aviso-leve">
      ${Icons.clock || Icons.alert}
      <span>Lembre-se de pedir o lanche com antecedência (até 8h30 para o intervalo da manhã ou 14h30 para o da tarde) para garantir a entrega no recreio.</span>
    </div>
  `;
}

// Hash bem simples (NÃO é seguro - use só como "ofuscação")
function hashSenha(s) {
  let h = 0;
  for (let i=0; i<s.length; i++) {
    h = (h<<5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return String(h);
}

function escapeHTML(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function gerarId(prefixo) {
  return prefixo + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

/* ============================================================
   ÍCONE DO PRODUTO (emoji ou inicial colorida como fallback)
   ============================================================ */
// Detecta se a string tem um emoji "de verdade" (não vazio, não o genérico)
function temEmojiReal(emoji) {
  if (!emoji) return false;
  const e = emoji.trim();
  if (e === '' || e === '🍽️' || e === '🍔') return false;
  // Verifica se contém ao menos um caractere de emoji (faixas Unicode comuns)
  return /\p{Extended_Pictographic}/u.test(e);
}

// Paleta de cores CDA para as iniciais (determinística pelo nome)
const CORES_INICIAL = [
  ['#26B7C9', '#1A8E9D'], // turquesa
  ['#F2C12E', '#d9a91a'], // amarelo
  ['#E63946', '#C42836'], // vermelho
  ['#10b981', '#059669'], // verde
];
function corDoNome(nome) {
  let soma = 0;
  for (const c of (nome || '')) soma += c.charCodeAt(0);
  return CORES_INICIAL[soma % CORES_INICIAL.length];
}

// Retorna o HTML do ícone: emoji se houver, senão círculo com a inicial
// tamanho: 'sm' (resumos), 'md' (cardápio), 'lg' (listagem admin)
function iconeProduto(produto, tamanho = 'md') {
  const dims = { sm: 30, md: 40, lg: 56 };
  const fontes = { sm: 14, md: 18, lg: 26 };
  const px = dims[tamanho] || 40;
  const fonte = fontes[tamanho] || 18;
  const emoji = produto?.emoji;
  if (temEmojiReal(emoji)) {
    return `<span style="font-size:${px}px;line-height:1;">${emoji}</span>`;
  }
  // Fallback: inicial colorida
  const nome = produto?.nome || '?';
  const inicial = nome.trim().charAt(0).toUpperCase() || '?';
  const [c1, c2] = corDoNome(nome);
  return `<span style="display:inline-grid;place-items:center;width:${px}px;height:${px}px;border-radius:${Math.round(px*0.28)}px;background:linear-gradient(135deg,${c1},${c2});color:#fff;font-weight:800;font-size:${fonte}px;font-family:'Fraunces',serif;flex-shrink:0;">${escapeHTML(inicial)}</span>`;
}

function copiar(texto) {
  navigator.clipboard?.writeText(texto).then(
    () => mostrarToast('Copiado!'),
    () => mostrarToast('Erro ao copiar')

}

function mostrarToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:12px 20px;border-radius:12px;font-weight:600;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.2);animation:fadeIn 0.2s;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

/* ============================================================
   ROTEAMENTO / RENDER PRINCIPAL
   ============================================================ */
function render() {
  const app = document.getElementById('app');

  if (!State.sessao) {
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }

  // Primeiro acesso: pai precisa criar a própria senha antes de usar o sistema
  if (State.tela === 'definir-senha') {
    app.innerHTML = renderDefinirSenha();
    bindDefinirSenha();
    return;
  }

  if (State.sessao.tipo === 'pai') {
    app.innerHTML = renderAppPai();
    bindAppPai();
  } else if (State.sessao.tipo === 'admin') {
    app.innerHTML = renderAppAdmin();
    bindAppAdmin();
  }

  if (State.modalAberto) {
    document.body.insertAdjacentHTML('beforeend', State.modalAberto.html);
    State.modalAberto.bind?.();
  }
}

function fecharModal() {
  document.querySelectorAll('.modal-bg').forEach(m => m.remove());
  State.modalAberto = null;
  // Se chegou atualização em tempo real enquanto o modal estava aberto, aplica agora
  if (State.atualizacaoPendente) {
    State.atualizacaoPendente = false;
    render();
  }
}

/* ============================================================
   TELA DE LOGIN
   ============================================================ */
function renderLogin() {
  const isPai = State.modoLogin === 'pai';
  return `
    <div class="login-bg">
      <div class="login-card ${isPai ? '' : 'modo-colegio'}">
        <div class="login-logo-wrap">
          ${logoHTML('logo-lg')}
        </div>
        <h1 class="login-titulo">Bem-vindo</h1>
        <p class="login-subtitulo">Sistema da lanchonete · Colégio CDA</p>

        <div class="switch-modo">
          <button id="btn-modo-pai" class="${isPai ? 'ativo-pai' : ''}">
            ${Icons.user} Responsável
          </button>
          <button id="btn-modo-colegio" class="${!isPai ? 'ativo-colegio' : ''}">
            ${Icons.school} Colégio
          </button>
        </div>

        <form id="form-login">
          <div id="alerta-login"></div>

          ${isPai ? `
            <div class="form-group">
              <label class="form-label">Usuário ou email</label>
              <input type="text" class="form-input" id="login-email" placeholder="seu.usuario ou email@exemplo.com" autocomplete="username" required>
            </div>
          ` : ''}

          <div class="form-group">
            <label class="form-label">Senha</label>
            <div class="input-senha-wrap">
              <input type="password" class="form-input" id="login-senha" placeholder="${isPai ? 'Sua senha' : 'Senha de admin'}" autocomplete="current-password" required>
              <button type="button" class="input-senha-toggle" id="toggle-senha">${Icons.eye}</button>
            </div>
          </div>

          <button type="submit" class="btn ${isPai ? 'btn-primary' : 'btn-vermelho'} btn-block" style="margin-top: 8px;">
            Entrar
          </button>
        </form>

        ${isPai ? `
          <p style="text-align:center;color:var(--pedra-500);font-size:13px;margin-top:18px;">
            Não tem conta? Solicite ao colégio.
          </p>
        ` : ''}
      </div>
    </div>
  `;
}

function bindLogin() {
  document.getElementById('btn-modo-pai').onclick = () => {
    State.modoLogin = 'pai';
    render();
  };
  document.getElementById('btn-modo-colegio').onclick = () => {
    State.modoLogin = 'colegio';
    render();
  };

  // Toggle senha
  document.getElementById('toggle-senha').onclick = () => {
    const inp = document.getElementById('login-senha');
    const btn = document.getElementById('toggle-senha');
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.innerHTML = Icons.eyeOff;
    } else {
      inp.type = 'password';
      btn.innerHTML = Icons.eye;
    }
  };

  document.getElementById('form-login').onsubmit = async (e) => {
    e.preventDefault();
    const senha = document.getElementById('login-senha').value;
    const alerta = document.getElementById('alerta-login');
    alerta.innerHTML = '';

    // Trava contra cliques múltiplos durante o processo (que é assíncrono)
    const btnSubmit = e.currentTarget.querySelector('button[type="submit"]');
    if (btnSubmit.dataset.processando === '1') return;
    btnSubmit.dataset.processando = '1';
    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Entrando...';

    const reativarBtn = () => {
      btnSubmit.dataset.processando = '0';
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Entrar';
    };

    if (State.modoLogin === 'colegio') {
      // Login admin: mantém validação local (não usa Auth)
      if (hashSenha(senha) === State.senhaAdminHash) {
        State.sessao = { tipo: 'admin' };
        State.tela = 'app';
        reativarBtn();
        render();
      } else {
        alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Senha incorreta.</span></div>`;
        reativarBtn();
      }
    } else {
      // Login do pai: tenta Auth primeiro (pais já migrados)
      const loginInput = document.getElementById('login-email').value.trim().toLowerCase().replace(/\s+/g, '');
      const erroGenerico = `<div class="alert alert-erro">${Icons.alert}<span>Usuário ou senha incorretos. Em caso de dúvida, entre em contato com o colégio.</span></div>`;

      // Detecta se é email ou usuário
      const ehEmail = loginInput.includes('@');

      if (ehEmail) {
        // — CAMINHO AUTH: login com email + senha via Supabase Auth —
        try {
          const { data: authData, error: authError } = await db.auth.signInWithPassword({
            email: loginInput,
            password: senha
          });

          if (authError || !authData?.user) {
            // Auth falhou: pode ser usuário ainda não migrado (tentamos legado abaixo)
            // ou senha realmente errada — não revelamos qual dos dois
            const paiLegado = State.pais.find(p => p.email === loginInput);
            if (paiLegado && paiLegado.senhaHash === hashSenha(senha)) {
              // Ainda no sistema legado (auth_user_id ainda não criado)
              entrarComoLegado(paiLegado, alerta, reativarBtn);
            } else {
              alerta.innerHTML = erroGenerico;
              reativarBtn();
            }
            return;
          }

          // Auth OK: carrega só os dados deste pai
          try {
            const pai = await carregarDadosPai(authData.user.id);
            if (!pai) throw new Error('Responsável não encontrado');
            State.sessao = { tipo: 'pai', userId: pai.id, authUserId: authData.user.id };
            State.tela = 'app';
            reativarBtn();
            render();
          } catch (err) {
            await db.auth.signOut();
            alerta.innerHTML = erroGenerico;
            reativarBtn();
          }
        } catch (err) {
          alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Não foi possível conectar. Verifique sua internet e tente novamente.</span></div>`;
          reativarBtn();
        }
      } else {
        // — CAMINHO LEGADO: login por nome de usuário (sem @ = não é email) —
        // Pais que ainda não migraram pro Auth entram por aqui
        const paiLegado = State.pais.find(p => p.usuario === loginInput);
        if (!paiLegado || paiLegado.senhaHash !== hashSenha(senha)) {
          alerta.innerHTML = erroGenerico;
          reativarBtn();
          return;
        }
        entrarComoLegado(paiLegado, alerta, reativarBtn);
      }
    }
  };
}

// Entra no sistema com o responsável pelo caminho legado (sem Auth)
// Usado durante a transição enquanto alguns pais ainda não foram migrados
function entrarComoLegado(pai, alerta, reativarBtn) {
  State.sessao = { tipo: 'pai', userId: pai.id, legado: true };
  if (pai.senhaTemporaria) {
    State.tela = 'definir-senha';
  } else {
    State.tela = 'app';
  }
  reativarBtn();
  render();
}

async function logout() {
  // Se o pai estava logado via Auth (não legado), encerra a sessão no Supabase
  if (State.sessao?.authUserId && !State.sessao?.legado) {
    try { await db.auth.signOut(); } catch (e) { /* se falhar, segue o logout local */ }
  }
  State.sessao = null;
  State.tela = 'login';
  // Reset estado de telas
  State.abaPai = 'novoPedido';
  State.abaAdmin = 'painel';
  State.pedidoEtapa = 'aluno';
  State.alunoSelecionadoId = null;
  State.carrinho = {};
  State.observacaoPedido = '';
  State.pedidoFinalId = null;
  render();
}

/* ============================================================
   PRIMEIRO ACESSO: DEFINIR SENHA PRÓPRIA
   ============================================================ */
// Regras de senha forte (padrão atual razoável para o contexto)
function validarSenhaForte(senha) {
  const problemas = [];
  if (senha.length < 8) problemas.push('Pelo menos 8 caracteres');
  if (!/[a-zA-Z]/.test(senha)) problemas.push('Pelo menos uma letra');
  if (!/[0-9]/.test(senha)) problemas.push('Pelo menos um número');
  return problemas;
}

// Calcula força (0 a 4) para o medidor visual
function forcaSenha(senha) {
  let f = 0;
  if (senha.length >= 8) f++;
  if (senha.length >= 12) f++;
  if (/[a-z]/.test(senha) && /[A-Z]/.test(senha)) f++;
  if (/[0-9]/.test(senha)) f++;
  if (/[^a-zA-Z0-9]/.test(senha)) f++;
  return Math.min(f, 4);
}

function renderDefinirSenha() {
  const pai = State.pais.find(p => p.id === State.sessao.userId);
  return `
    <div class="login-bg">
      <div class="login-card">
        <div class="login-logo-wrap">${logoHTML('logo-lg')}</div>
        <h1 class="login-titulo">Crie sua senha</h1>
        <p class="login-subtitulo">Olá, ${escapeHTML((pai?.nome || '').split(' ')[0])}! Este é seu primeiro acesso.<br>Defina uma senha pessoal para proteger sua conta.</p>
        <form id="form-definir-senha">
          <div class="form-group">
            <label class="form-label">Nova senha</label>
            <div style="position:relative;">
              <input type="password" class="form-input" id="nova-senha" placeholder="Crie uma senha" autocomplete="new-password">
              <button type="button" id="toggle-nova" aria-label="Mostrar ou ocultar senha" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--pedra-500);">${Icons.eye}</button>
            </div>
          </div>
          <div id="medidor-senha" style="margin-bottom:14px;"></div>
          <div class="form-group">
            <label class="form-label">Confirme a senha</label>
            <input type="password" class="form-input" id="confirma-senha" placeholder="Digite novamente" autocomplete="new-password">
          </div>
          <div style="background:var(--pedra-50);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--pedra-600);">
            <strong style="display:block;margin-bottom:6px;color:var(--pedra-700);">Sua senha precisa ter:</strong>
            <div id="regra-len">○ Pelo menos 8 caracteres</div>
            <div id="regra-letra">○ Pelo menos uma letra</div>
            <div id="regra-num">○ Pelo menos um número</div>
          </div>
          <div id="alerta-definir"></div>
          <button type="submit" class="btn btn-primary btn-block">Salvar e entrar</button>
        </form>
      </div>
    </div>
  `;
}

function bindDefinirSenha() {
  const novaInput = document.getElementById('nova-senha');
  const confirmaInput = document.getElementById('confirma-senha');
  const medidor = document.getElementById('medidor-senha');

  // Toggle mostrar/ocultar senha
  document.getElementById('toggle-nova').onclick = () => {
    const tipo = novaInput.type === 'password' ? 'text' : 'password';
    novaInput.type = tipo;
  };

  // Atualiza medidor e checklist em tempo real
  function atualizar() {
    const s = novaInput.value;
    const f = forcaSenha(s);
    const cores = ['#e7e5e4', '#E63946', '#F2C12E', '#26B7C9', '#10b981'];
    const textos = ['', 'Fraca', 'Razoável', 'Boa', 'Forte'];
    let barras = '';
    for (let i = 1; i <= 4; i++) {
      barras += `<div style="flex:1;height:6px;border-radius:3px;background:${i <= f ? cores[f] : '#e7e5e4'};transition:background 0.3s;"></div>`;
    }
    medidor.innerHTML = s ? `
      <div style="display:flex;gap:5px;margin-bottom:6px;">${barras}</div>
      <div style="font-size:12px;font-weight:600;color:${cores[f]};">${textos[f]}</div>
    ` : '';

    // Checklist
    const setRegra = (id, ok) => {
      const el = document.getElementById(id);
      if (el) {
        el.style.color = ok ? 'var(--verde)' : 'var(--pedra-600)';
        el.textContent = (ok ? '● ' : '○ ') + el.textContent.slice(2);
      }
    };
    setRegra('regra-len', s.length >= 8);
    setRegra('regra-letra', /[a-zA-Z]/.test(s));
    setRegra('regra-num', /[0-9]/.test(s));
  }
  novaInput.addEventListener('input', atualizar);

  document.getElementById('form-definir-senha').onsubmit = async (e) => {
    e.preventDefault();
    const nova = novaInput.value;
    const confirma = confirmaInput.value;
    const alerta = document.getElementById('alerta-definir');
    alerta.innerHTML = '';

    const problemas = validarSenhaForte(nova);
    if (problemas.length > 0) {
      alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>A senha não atende aos requisitos: ${problemas.join(', ').toLowerCase()}.</span></div>`;
      return;
    }
    if (nova !== confirma) {
      alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>As senhas não coincidem. Digite a mesma senha nos dois campos.</span></div>`;
      return;
    }

    const btn = e.currentTarget.querySelector('button[type="submit"]');
    if (btn.dataset.processando === '1') return;
    btn.dataset.processando = '1';
    btn.disabled = true;
    btn.style.opacity = '0.6';
    btn.textContent = 'Salvando...';

    try {
      const pai = State.pais.find(p => p.id === State.sessao.userId);

      if (State.sessao.authUserId && !State.sessao.legado) {
        // Pai logado via Auth: atualiza a senha no Auth (bcrypt profissional)
        // e marca senha_temporaria = false na tabela pais
        const { error: authErr } = await db.auth.updateUser({ password: nova });
        if (authErr) throw authErr;
        await API.definirSenhaPropria(pai.id, hashSenha(nova));
      } else {
        // Caminho legado: atualiza só o hash na tabela pais
        await API.definirSenhaPropria(pai.id, hashSenha(nova));
      }

      pai.senhaHash = hashSenha(nova);
      pai.senhaTemporaria = false;
      State.tela = 'app';
      render();
      mostrarToast('Senha criada com sucesso!');
    } catch (err) {
      btn.dataset.processando = '0';
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.textContent = 'Salvar e entrar';
      alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Não foi possível salvar. Verifique sua conexão e tente novamente.</span></div>`;
    }
  };
}
</script>

          </div>

          </button>

        ${renderConteudoPai(pai)}
      </main>

  `;
}

function bindAppPai() {
  document.getElementById('btn-logout-pai').onclick = logout;
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      // A: se há itens no carrinho e o pedido não foi concluído, confirma antes de descartar
      const temCarrinho = Object.values(State.carrinho).some(q => q > 0);
      if (temCarrinho && State.pedidoEtapa !== 'sucesso' && t.dataset.aba !== State.abaPai) {
        if (!confirm('Você tem itens no carrinho que ainda não foram reservados. Se sair agora, o carrinho será esvaziado.\n\nDeseja sair mesmo assim?')) return;
      }
      State.abaPai = t.dataset.aba;
      // Reset wizard se voltar para novo pedido
      if (State.abaPai === 'novoPedido') {
        State.pedidoEtapa = 'aluno';
        State.alunoSelecionadoId = null;
        State.carrinho = {};
        State.observacaoPedido = '';
        State.pedidoFinalId = null;
      }
      State.atualizacaoPendente = false; // já vamos re-renderizar com dados atuais
      render();
    };
  });

  // Bind específico de cada aba
  if (State.abaPai === 'novoPedido') bindNovoPedido();
  if (State.abaPai === 'meusPedidos') bindMeusPedidos();
}

function renderConteudoPai(pai) {
  const meusFilhos = State.alunos.filter(a => a.responsavelId === pai.id);

  if (State.abaPai === 'novoPedido') {
    return renderNovoPedido(pai, meusFilhos);
  }
  if (State.abaPai === 'meusPedidos') {
    return renderMeusPedidos(pai, meusFilhos);
  }
  if (State.abaPai === 'meusFilhos') {
    return renderMeusFilhos(pai, meusFilhos);
  }
  return '';
}

/* ----------- NOVO PEDIDO ----------- */
function renderNovoPedido(pai, meusFilhos) {
  if (meusFilhos.length === 0) {
    return `
      <div class="aviso">
        ${Icons.alert}
        <span>Você ainda não tem filhos cadastrados no sistema. Solicite ao colégio que cadastre seu(s) filho(s) para você poder fazer pedidos.</span>
      </div>
      <div class="empty">
        <div class="empty-icon">${Icons.users}</div>
        <p>Nenhum filho cadastrado.</p>
      </div>
    `;
  }

  const ordem = ['aluno', 'cardapio', 'pagamento', 'sucesso'];
  const idxAtivo = ordem.indexOf(State.pedidoEtapa);

  let html = `<div class="progresso">`;
  ordem.forEach((_, i) => {
    html += `<div class="progresso-step ${i <= idxAtivo ? 'ativa' : ''}"></div>`;
  });
  html += `</div>`;

  if (State.pedidoEtapa === 'aluno') {
    html += renderEtapaAluno(meusFilhos);
  } else if (State.pedidoEtapa === 'cardapio') {
    html += renderEtapaCardapio();
  } else if (State.pedidoEtapa === 'pagamento') {
    html += renderEtapaPagamento();
  } else if (State.pedidoEtapa === 'sucesso') {
    html += renderEtapaSucesso();
  }

  return html;
}

function bindNovoPedido() {
  // Etapa aluno
  document.querySelectorAll('[data-aluno]').forEach(b => {
    b.onclick = () => {
      State.alunoSelecionadoId = b.dataset.aluno;
      State.pedidoEtapa = 'cardapio';
      State.carrinho = {};
      render();
    };
  });

  // Etapa cardápio
  document.getElementById('btn-trocar-aluno')?.addEventListener('click', () => {
    State.pedidoEtapa = 'aluno';
    State.alunoSelecionadoId = null;
    render();
  });
  document.querySelectorAll('[data-action="adicionar"]').forEach(b => {
    b.onclick = () => {
      const id = b.dataset.id;
      State.carrinho[id] = (State.carrinho[id] || 0) + 1;
      render();
    };
  });
  document.querySelectorAll('[data-action="remover"]').forEach(b => {
    b.onclick = () => {
      const id = b.dataset.id;
      if (State.carrinho[id] > 1) State.carrinho[id]--;
      else delete State.carrinho[id];
      render();
    };
  });
  document.getElementById('ir-pagamento')?.addEventListener('click', () => {
    State.pedidoEtapa = 'pagamento';
    render();
  });

  // Etapa pagamento
  document.getElementById('btn-voltar-cardapio')?.addEventListener('click', () => {
    State.pedidoEtapa = 'cardapio';
    render();
  });
  document.getElementById('input-observacao')?.addEventListener('input', e => {
    State.observacaoPedido = e.target.value;
  });
  document.querySelectorAll('[data-metodo]').forEach(b => {
    b.onclick = () => {
      State.metodoPagamento = b.dataset.metodo;
      render();
    };
  });
  document.getElementById('btn-confirmar-pedido')?.addEventListener('click', (e) => {
    const obs = document.getElementById('input-observacao')?.value || '';
    State.observacaoPedido = obs;
    // Trava contra duplo-clique: desabilita o botão imediatamente
    const btn = e.currentTarget;
    if (btn.dataset.processando === '1') return;
    btn.dataset.processando = '1';
    btn.disabled = true;
    btn.style.opacity = '0.6';
    btn.textContent = 'Reservando...';
    finalizarPedido();
  });

  // Etapa sucesso
  document.getElementById('btn-copiar-pix')?.addEventListener('click', () => {
    copiar(CONFIG.PIX_CHAVE);
  });
  document.getElementById('btn-novo-pedido')?.addEventListener('click', () => {
    State.pedidoEtapa = 'aluno';
    State.alunoSelecionadoId = null;
    State.carrinho = {};
    State.observacaoPedido = '';
    State.pedidoFinalId = null;
    render();
  });
  document.getElementById('btn-ver-pedidos')?.addEventListener('click', () => {
    State.abaPai = 'meusPedidos';
    render();
  });
}

async function finalizarPedido() {
  const aluno = State.alunos.find(a => a.id === State.alunoSelecionadoId);
  const produtosAtivos = produtosDeHoje();
  const itensCarrinho = produtosAtivos.filter(p => State.carrinho[p.id] > 0);
  const total = itensCarrinho.reduce((s,p) => s + p.preco * State.carrinho[p.id], 0);

  // Guarda contra pedido inválido (aluno sumiu, ou carrinho esvaziou porque
  // um item saiu do cardápio enquanto o pai montava o pedido)
  if (!aluno) {
    alert('Não foi possível identificar o aluno. Volte e selecione novamente.');
    State.pedidoEtapa = 'aluno';
    const btn = document.getElementById('btn-confirmar-pedido');
    if (btn) { btn.dataset.processando = '0'; btn.disabled = false; btn.style.opacity = '1'; btn.textContent = 'Confirmar reserva'; }
    render();
    return;
  }
  if (itensCarrinho.length === 0 || total <= 0) {
    alert('Seu carrinho está vazio ou os itens não estão mais disponíveis hoje. Adicione lanches antes de confirmar.');
    State.pedidoEtapa = 'cardapio';
    render();
    return;
  }

  const pedidoData = {
    alunoId: aluno.id,
    paiId: State.sessao.userId,
    data: HOJE(),
    itens: itensCarrinho.map(p => ({
      produtoId: p.id,
      nome: p.nome,
      preco: p.preco,
      emoji: p.emoji,
      quantidade: State.carrinho[p.id]
    })),
    total,
    observacao: State.observacaoPedido.trim(),
    metodoPagamento: State.metodoPagamento,
    statusPagamento: 'pendente',
    statusEntrega: 'reservado'
  };

  try {
    const pedido = await API.criarPedido(pedidoData);
    State.pedidos.unshift(pedido);
    State.pedidoFinalId = pedido.id;
    State.pedidoEtapa = 'sucesso';
    render();
  } catch (e) {
    // Reabilita o botão para o usuário poder tentar novamente
    const btn = document.getElementById('btn-confirmar-pedido');
    if (btn) {
      btn.dataset.processando = '0';
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.textContent = 'Confirmar reserva';
    }
    alert('Não foi possível salvar o pedido. Verifique sua conexão e tente novamente.\n\nDetalhe: ' + e.message);
  }
}

function mensagemWhatsApp(pedido, aluno) {
  const itensTxt = pedido.itens
    .map(i => `• ${i.nome} × ${i.quantidade} — ${formatBRL(i.preco * i.quantidade)}`)
    .join('\n');
  const obs = pedido.observacao ? `\n\n📝 Observação: ${pedido.observacao}` : '';
  return `*🥪 Reserva de Lanche - CDA*

👦 *Aluno:* ${aluno.nome}
🎒 *Turma:* ${aluno.turma}
📅 *Data:* ${formatData(pedido.data)}
🆔 *Pedido:* #${pedido.id.slice(-6).toUpperCase()}

*Itens:*
${itensTxt}

💰 *Total:* ${formatBRL(pedido.total)}
💳 *Pagamento:* ${pedido.metodoPagamento === 'pix' ? 'PIX' : 'Dinheiro'}${pedido.metodoPagamento === 'pix' ? `\n🔑 *Chave:* ${CONFIG.PIX_CHAVE}` : ''}${obs}

_Enviado via Sistema da Lanchonete CDA_`;
}

/* ----------- MEUS PEDIDOS ----------- */
function renderMeusPedidos(pai, meusFilhos) {
  const meusPedidos = State.pedidos
    .filter(p => meusFilhos.some(f => f.id === p.alunoId) && p.statusEntrega !== 'cancelado')
    .sort((a,b) => b.criadoEm.localeCompare(a.criadoEm));

  if (meusPedidos.length === 0) {
    return `
      <h1 class="page-titulo">Meus pedidos</h1>
      <p class="page-subtitulo">Histórico de reservas dos seus filhos.</p>
      <div class="empty">
        <div class="empty-icon">${Icons.shoppingBag}</div>
        <p style="margin-bottom:14px;">Você ainda não fez nenhum pedido.</p>
        <button class="btn btn-primary" id="btn-fazer-pedido">Fazer primeiro pedido</button>
      </div>
    `;
  }

  let html = `
    <h1 class="page-titulo">Meus pedidos</h1>
    <p class="page-subtitulo">Histórico de reservas dos seus filhos.</p>
  `;

  meusPedidos.forEach(p => {
    const aluno = State.alunos.find(a => a.id === p.alunoId);
    const mensagem = mensagemWhatsApp(p, aluno);
    const linkWA = `https://wa.me/${CONFIG.WHATSAPP_NUMERO}?text=${encodeURIComponent(mensagem)}`;
    const itensTxt = p.itens.map(i => `${escapeHTML(i.emoji || '🍽️')} ${escapeHTML(i.nome)} ×${i.quantidade}`).join(' · ');

    html += `
      <div class="pedido-card">
        <div class="pedido-header">
          <div>
            <div class="pedido-aluno-nome">${escapeHTML(aluno?.nome || 'Aluno')}</div>
            <div class="pedido-meta">${formatData(p.data)} · ${formatHora(p.criadoEm)} · #${p.id.slice(-6).toUpperCase()}</div>
          </div>
          <div class="pedido-badges">
            ${badgePagamento(p.statusPagamento)}
            ${badgeEntrega(p.statusEntrega)}
          </div>
        </div>
        <div class="pedido-itens">${itensTxt}</div>
        <div class="pedido-footer">
          <span style="font-weight:800;font-size:18px;color:var(--verde);">${formatBRL(p.total)}</span>
          ${p.statusPagamento === 'pendente' && p.statusEntrega !== 'cancelado' ? `
            <a href="${linkWA}" target="_blank" rel="noopener noreferrer" class="btn btn-whatsapp btn-sm">
              ${Icons.whatsapp} Reenviar
            </a>
          ` : ''}
        </div>
      </div>
    `;
  });
  return html;
}

function bindMeusPedidos() {
  document.getElementById('btn-fazer-pedido')?.addEventListener('click', () => {

  return `<span class="badge badge-${status}">${labels[status] || status}</span>`;
}
function badgeEntrega(status) {
  const labels = { reservado: 'Reservado', entregue: 'Entregue', cancelado: 'Cancelado' };
  return `<span class="badge badge-${status}">${labels[status] || status}</span>`;
}
</script>
