}

/* ----------- PAINEL: PRODUÇÃO DO DIA ----------- */
function renderPainelProducao() {
  const hoje = HOJE();
  const pedidosHoje = State.pedidos.filter(p => p.data === hoje);
  const pedidosValidos = pedidosHoje.filter(p => p.statusEntrega !== 'cancelado');

  // Pedidos ainda NÃO entregues (o que falta preparar)
  const pedidosPendentes = pedidosValidos.filter(p => p.statusEntrega === 'reservado');
  // Pedidos JÁ entregues
  const pedidosEntregues = pedidosValidos.filter(p => p.statusEntrega === 'entregue');

  // Agregar produção SOMENTE do que falta preparar (não entregue)
  const producaoMap = {};
  pedidosPendentes.forEach(p => {
    p.itens.forEach(i => {
      if (!producaoMap[i.produtoId]) producaoMap[i.produtoId] = { ...i, quantidade: 0 };
      producaoMap[i.produtoId].quantidade += i.quantidade;
    });
  });
  const producao = Object.values(producaoMap).sort((a,b) => b.quantidade - a.quantidade);

  // Lanches a preparar = só os não entregues
  const totalLanches = producao.reduce((s,p) => s + p.quantidade, 0);
  // Lanches entregues = soma dos itens dos pedidos entregues
  const totalEntregues = pedidosEntregues.reduce((s,p) => s + p.itens.reduce((so,i) => so + i.quantidade, 0), 0);

  const faturamento = pedidosValidos.reduce((s,p) => s + p.total, 0);
  const pendentes = pedidosHoje.filter(p => p.statusPagamento === 'pendente' && p.statusEntrega !== 'cancelado').length;

  let html = `
    <h1 class="page-titulo">Produção de hoje</h1>
    <p class="page-subtitulo">Tudo que precisa ser preparado para o recreio.</p>

    <div class="card-info">
      <div class="kpi kpi-verde">
        ${kpiIcon(Icons.shoppingBag)}
        <div class="kpi-label">Pedidos</div>
        <div class="kpi-valor">${pedidosHoje.length}</div>
      </div>
      <div class="kpi kpi-amarelo">
        ${kpiIcon(Icons.sandwich)}
        <div class="kpi-label">Lanches a preparar</div>
        <div class="kpi-valor">${totalLanches}</div>
      </div>
      <div class="kpi kpi-turquesa">
        ${kpiIcon(Icons.checkCircle)}
        <div class="kpi-label">Lanches entregues</div>
        <div class="kpi-valor">${totalEntregues}</div>
      </div>
      <div class="kpi kpi-turquesa">
        ${kpiIcon(Icons.dollar)}
        <div class="kpi-label">Faturamento</div>
        <div class="kpi-valor">${formatBRL(faturamento)}</div>
      </div>
      <div class="kpi kpi-vermelho">
        ${kpiIcon(Icons.alert)}
        <div class="kpi-label">Pgto. pendente</div>
        <div class="kpi-valor">${pendentes}</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2 style="font-size:18px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--turquesa);">
          <span style="display:flex;align-items:center;gap:8px;">${Icons.chefHat} Para preparar</span>
          ${totalLanches > 0 ? `<span style="background:var(--amarelo);color:#7c4a03;font-size:13px;font-weight:800;padding:4px 12px;border-radius:999px;">${totalLanches} ${totalLanches === 1 ? 'unidade' : 'unidades'}</span>` : ''}
        </h2>
  `;

  if (producao.length === 0) {
    html += `<p style="text-align:center;color:var(--pedra-500);padding:24px 0;">${totalEntregues > 0 ? 'Tudo entregue! Nada na fila. 🎉' : 'Nenhum pedido para hoje ainda.'}</p>`;
  } else {
    producao.forEach(p => {
      html += `
        <div style="display:flex;align-items:center;gap:14px;background:var(--pedra-50);padding:14px 16px;border-radius:14px;margin-bottom:8px;border-left:4px solid var(--turquesa);">
          <div style="font-size:32px;display:flex;align-items:center;">${iconeProduto(p, 'md')}</div>
          <div style="flex:1;font-weight:800;font-size:17px;">${escapeHTML(p.nome)}</div>
          <div class="serif" style="font-size:38px;font-weight:800;color:var(--verde);line-height:1;">${p.quantidade}</div>
        </div>
      `;
    });
  }

  html += `
      </div>
      <div class="card">
        <h2 style="font-size:18px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--turquesa);">
          ${Icons.users} Pedidos por aluno
        </h2>
        <div class="search-box">
          ${Icons.search}
          <input type="text" class="form-input" id="busca-producao" placeholder="Buscar aluno ou turma..." value="${escapeHTML(State.buscaProducao)}">
        </div>
        <div style="max-height:600px;overflow-y:auto;">
  `;

  // B: aplica o filtro de busca (nome do aluno ou turma)
  const termo = State.buscaProducao.trim().toLowerCase();
  const pedidosFiltrados = !termo ? pedidosHoje : pedidosHoje.filter(p => {
    const aluno = State.alunos.find(a => a.id === p.alunoId);
    return (aluno?.nome || '').toLowerCase().includes(termo) ||
           (aluno?.turma || '').toLowerCase().includes(termo);
  });

  if (pedidosFiltrados.length === 0) {
    html += `<p style="text-align:center;color:var(--pedra-500);padding:24px 0;">${termo ? 'Nenhum pedido encontrado para "' + escapeHTML(State.buscaProducao) + '".' : 'Sem pedidos ainda.'}</p>`;
  } else {
    pedidosFiltrados.forEach(p => {
      const aluno = State.alunos.find(a => a.id === p.alunoId);
      const cls = p.statusEntrega === 'entregue' ? 'entregue' : (p.statusEntrega === 'cancelado' ? 'cancelado' : '');
      html += `
        <div class="pedido-card ${cls}">
          <div class="pedido-header">
            <div>
              <div class="pedido-aluno-nome">${escapeHTML(aluno?.nome || '?')}</div>
              <div class="pedido-meta">Turma ${escapeHTML(aluno?.turma || '—')} · ${formatHora(p.criadoEm)}</div>
            </div>
            <div class="pedido-badges">
              ${badgePagamento(p.statusPagamento)}
              ${badgeEntrega(p.statusEntrega)}
            </div>
          </div>
          <div class="pedido-itens">
            ${p.itens.map(i => `<div>${escapeHTML(i.emoji || '🍽️')} ${escapeHTML(i.nome)} × ${i.quantidade}</div>`).join('')}
          </div>
          ${aluno?.observacoesMedicas ? `<div class="pedido-obs pedido-obs-medica">⚠️ ATENÇÃO MÉDICA: ${escapeHTML(aluno.observacoesMedicas)}</div>` : ''}
          ${p.observacao ? `<div class="pedido-obs">📝 ${escapeHTML(p.observacao)}</div>` : ''}
          <div class="pedido-footer">
            <span style="font-weight:800;color:var(--verde);">${formatBRL(p.total)}</span>
            ${p.statusEntrega === 'reservado' ? `
              <div class="pedido-acoes">
                ${p.statusPagamento === 'pendente' ? `<button class="btn btn-amarelo btn-sm" data-pagar="${p.id}">$ Pago</button>` : ''}
                <button class="btn btn-secondary btn-sm" data-cancelar="${p.id}">Cancelar</button>
                <button class="btn btn-success btn-sm" data-entregar="${p.id}">${Icons.check} Entregue</button>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    });
  }

  html += `
        </div>
      </div>
    </div>
  `;
  return html;
}

function bindPainelProducao() {
  // B: busca por aluno/turma (debounce pra não re-renderizar a cada tecla)
  const busca = document.getElementById('busca-producao');
  if (busca) {
    busca.oninput = () => {
      State.buscaProducao = busca.value;
      clearTimeout(window._buscaTimer);
      window._buscaTimer = setTimeout(() => {
        render();
        // devolve o foco ao campo depois do re-render
        const b2 = document.getElementById('busca-producao');
        if (b2) { b2.focus(); const fim = b2.value.length; b2.setSelectionRange(fim, fim); }
      }, 250);
    };
  }

  // E: marcar pagamento como pago direto da produção
  document.querySelectorAll('[data-pagar]').forEach(b => {
    b.onclick = async () => {
      if (b.dataset.processando === '1') return;
      b.dataset.processando = '1';
      b.disabled = true;
      b.style.opacity = '0.6';
      const id = b.dataset.pagar;
      const pedido = State.pedidos.find(p => p.id === id);
      try {
        await API.atualizarPedido(id, { statusPagamento: 'pago' });
        if (pedido) pedido.statusPagamento = 'pago';
        mostrarToast('Pagamento registrado!');
        render();
      } catch (e) {
        b.dataset.processando = '0';
        b.disabled = false;
        b.style.opacity = '1';
        alert('Não foi possível registrar o pagamento. Tente novamente.\n\nDetalhe: ' + e.message);
      }
    };
  });

  document.querySelectorAll('[data-entregar]').forEach(b => {
    b.onclick = async () => {
      if (b.dataset.processando === '1') return;
      b.dataset.processando = '1';
      b.disabled = true;
      b.style.opacity = '0.6';
      const id = b.dataset.entregar;
      const pedido = State.pedidos.find(p => p.id === id);
      try {
        await API.atualizarPedido(id, { statusEntrega: 'entregue' });
        pedido.statusEntrega = 'entregue';
        render();
      } catch (e) {
        b.dataset.processando = '0';
        b.disabled = false;
        b.style.opacity = '1';
        alert('Não foi possível marcar como entregue. Tente novamente.\n\nDetalhe: ' + e.message);
      }
    };
  });
  document.querySelectorAll('[data-cancelar]').forEach(b => {
    b.onclick = async () => {
      if (b.dataset.processando === '1') return;
      if (!confirm('Cancelar este pedido?')) return;
      b.dataset.processando = '1';
      b.disabled = true;
      b.style.opacity = '0.6';
      const id = b.dataset.cancelar;
      const pedido = State.pedidos.find(p => p.id === id);
      try {
        await API.atualizarPedido(id, { statusEntrega: 'cancelado' });
        pedido.statusEntrega = 'cancelado';
        render();
      } catch (e) {
        b.dataset.processando = '0';
        b.disabled = false;
        b.style.opacity = '1';
        alert('Não foi possível cancelar. Tente novamente.\n\nDetalhe: ' + e.message);
      }
    };
  });
}

function kpiIcon(svg) {
  return `<div style="margin-bottom:8px;">${svg.replace('width="22"', 'width="22" style="opacity:0.85;"')}</div>`;
}

/* ----------- PAINEL: PAGAMENTOS ----------- */
function renderPainelPagamentos() {
  const filtro = State.filtroPagamentos;
  const filtrados = State.pedidos
    .filter(p => p.statusEntrega !== 'cancelado')
    .filter(p => filtro === 'todos' ? true : p.statusPagamento === filtro)
    .sort((a,b) => b.criadoEm.localeCompare(a.criadoEm));

  const totalPendente = State.pedidos
    .filter(p => p.statusPagamento === 'pendente' && p.statusEntrega !== 'cancelado')
    .reduce((s,p) => s + p.total, 0);

  let html = `
    <h1 class="page-titulo">Pagamentos</h1>
    <p class="page-subtitulo">Confirme PIX recebidos e dinheiro entregue.</p>

    <div class="pendente-total">
      ${Icons.alert}
      <div>
        <div class="pendente-total-label">Total pendente</div>
        <div class="pendente-total-valor">${formatBRL(totalPendente)}</div>
      </div>
    </div>

    <div class="filtros">
      <button class="filtro-btn ${filtro === 'pendente' ? 'ativo' : ''}" data-filtro="pendente">Pendentes</button>
      <button class="filtro-btn ${filtro === 'pago' ? 'ativo' : ''}" data-filtro="pago">Pagos</button>
      <button class="filtro-btn ${filtro === 'todos' ? 'ativo' : ''}" data-filtro="todos">Todos</button>
    </div>

    <div class="tabela-wrap">
  `;

  if (filtrados.length === 0) {
    html += `<p style="text-align:center;padding:40px;color:var(--pedra-500);">Nenhum pedido nessa categoria.</p>`;
  } else {
    filtrados.forEach(p => {
      const aluno = State.alunos.find(a => a.id === p.alunoId);
      html += `
        <div style="padding:14px;border-bottom:1px solid var(--pedra-100);display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div style="flex:1;min-width:180px;">
            <div style="font-weight:700;">${escapeHTML(aluno?.nome || '?')}</div>
            <div style="font-size:12px;color:var(--pedra-500);">${formatData(p.data)} · ${formatHora(p.criadoEm)} · #${p.id.slice(-6).toUpperCase()}</div>
            <div style="font-size:12px;color:var(--pedra-500);margin-top:2px;">${p.itens.map(i => escapeHTML(i.nome)+'×'+i.quantidade).join(', ')}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-weight:800;color:var(--verde);">${formatBRL(p.total)}</div>
            <div style="font-size:11px;color:var(--pedra-500);text-transform:uppercase;letter-spacing:0.05em;">${p.metodoPagamento}</div>
          </div>
          ${p.statusPagamento === 'pendente'
            ? `<button class="btn btn-success btn-sm" data-confirmar="${p.id}">${Icons.check} Confirmar</button>`
            : `<button class="btn btn-secondary btn-sm" data-desfazer="${p.id}">Desfazer</button>`
          }
        </div>
      `;
    });
  }

  html += `</div>`;
  return html;
}

function bindPainelPagamentos() {
  document.querySelectorAll('[data-filtro]').forEach(b => {
    b.onclick = () => {
      State.filtroPagamentos = b.dataset.filtro;
      render();
    };
  });
  document.querySelectorAll('[data-confirmar]').forEach(b => {
    b.onclick = async () => {
      const pedido = State.pedidos.find(p => p.id === b.dataset.confirmar);
      try {
        await API.atualizarPedido(pedido.id, { statusPagamento: 'pago' });
        pedido.statusPagamento = 'pago';
        render();
      } catch (e) { alert('Não foi possível registrar o pagamento. Verifique sua conexão e tente novamente.'); }
    };
  });
  document.querySelectorAll('[data-desfazer]').forEach(b => {
    b.onclick = async () => {
      const pedido = State.pedidos.find(p => p.id === b.dataset.desfazer);
      try {
        await API.atualizarPedido(pedido.id, { statusPagamento: 'pendente' });
        pedido.statusPagamento = 'pendente';
        render();
      } catch (e) { alert('Não foi possível alterar o pagamento. Verifique sua conexão e tente novamente.'); }
    };
  });
}

/* ----------- PAINEL: RESPONSÁVEIS (PAIS) ----------- */
function renderPainelPais() {
  const busca = State.buscaPaisAdmin.toLowerCase();
  const filtrados = State.pais.filter(p =>
    p.nome.toLowerCase().includes(busca) ||
    (p.usuario || '').toLowerCase().includes(busca) ||
    (p.email || '').toLowerCase().includes(busca) ||
    (p.telefone || '').includes(busca)
  );

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
      <div>
        <h1 class="page-titulo">Responsáveis</h1>
        <p class="page-subtitulo" style="margin-bottom:0;">${State.pais.length} cadastrado(s) · Crie o login que será usado pelo pai/mãe.</p>
      </div>
      <button class="btn btn-primary" id="btn-novo-pai">${Icons.plus} Novo responsável</button>
    </div>

    <div class="search-box">
      ${Icons.search}
      <input type="text" class="form-input" id="busca-pais" placeholder="Buscar por nome, usuário, email ou telefone..." value="${escapeHTML(State.buscaPaisAdmin)}">
    </div>

    <div class="tabela-wrap">
  `;

  if (filtrados.length === 0) {
    html += `<p style="text-align:center;padding:40px;color:var(--pedra-500);">${State.pais.length === 0 ? 'Nenhum responsável cadastrado.' : 'Nenhum resultado.'}</p>`;
  } else {
    html += `
      <table class="tabela">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Usuário (login)</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Filhos</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
    `;
    filtrados.forEach(p => {
      const numFilhos = State.alunos.filter(a => a.responsavelId === p.id).length;
      // Se o cadastro for antigo (sem usuário), mostra o email como login
      const loginExibir = p.usuario || p.email || '—';
      html += `
        <tr>
          <td>
            <div style="font-weight:700;">${escapeHTML(p.nome)}</div>
          </td>
          <td data-label="Usuário" style="font-family:monospace;font-size:13px;font-weight:700;color:var(--turquesa);">${escapeHTML(loginExibir)}</td>
          <td data-label="Email" style="font-family:monospace;font-size:13px;">${escapeHTML(p.email || '—')}</td>
          <td data-label="Telefone" style="font-size:13px;">${escapeHTML(p.telefone || '—')}</td>
          <td data-label="Filhos" class="num">${numFilhos}</td>
          <td class="text-right">
            <button class="btn btn-secondary btn-sm" data-edit-pai="${p.id}">Editar</button>
            <button class="btn btn-icon" style="color:var(--vermelho);" data-del-pai="${p.id}" title="Excluir">${Icons.trash}</button>
          </td>
        </tr>
      `;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;
  return html;
}

function bindPainelPais() {
  document.getElementById('busca-pais')?.addEventListener('input', e => {
    State.buscaPaisAdmin = e.target.value;
    // Re-renderiza só essa parte
    document.querySelector('.tabela-wrap').outerHTML = renderPainelPais().match(/<div class="tabela-wrap">[\s\S]*<\/div>/)[0];
    bindPainelPais();
  });

  document.getElementById('btn-novo-pai')?.addEventListener('click', () => {
    abrirModalPai(null);
  });
  document.querySelectorAll('[data-edit-pai]').forEach(b => {
    b.onclick = () => {
      const pai = State.pais.find(p => p.id === b.dataset.editPai);
      abrirModalPai(pai);
    };
  });
  document.querySelectorAll('[data-del-pai]').forEach(b => {
    b.onclick = async () => {
      const pai = State.pais.find(p => p.id === b.dataset.delPai);
      const filhos = State.alunos.filter(a => a.responsavelId === pai.id);
      // Impede deixar alunos órfãos: exige remover/reatribuir os filhos antes
      if (filhos.length > 0) {
        const nomes = filhos.map(f => f.nome).join(', ');
        alert(`Não dá para excluir este responsável porque ele tem ${filhos.length} aluno(s) vinculado(s):\n\n${nomes}\n\nPrimeiro vá na aba Alunos e exclua (ou edite, vinculando a outro responsável) esses alunos. Depois exclua o responsável.`);
        return;
      }
      if (!confirm(`Excluir o responsável ${pai.nome}? Esta ação não pode ser desfeita.`)) return;
      try {
        await API.excluirPai(pai.id);

}

function abrirModalPai(pai) {
  const ehNovo = !pai;
  const titulo = ehNovo ? 'Cadastrar responsável' : 'Editar responsável';

  State.modalAberto = {
    html: `
      <div class="modal-bg" id="modal-bg">
        <div class="modal" onclick="event.stopPropagation()">
          <h2 class="modal-titulo">${titulo}</h2>
          <p class="modal-subtitulo">Esses dados serão usados pelo responsável para fazer login.</p>
          <form id="form-pai">
            <div class="form-group">
              <label class="form-label">Nome completo *</label>
              <input type="text" class="form-input" id="pai-nome" value="${escapeHTML(pai?.nome || '')}" required>
            </div>
            <div class="form-group">
              <label class="form-label">Usuário (login) *</label>
              <input type="text" class="form-input" id="pai-usuario" value="${escapeHTML(pai?.usuario || '')}" placeholder="Ex: maria.silva" required>
              <small style="color:var(--pedra-500);font-size:12px;">Sem espaços. Será usado pelo responsável para entrar.</small>
            </div>
            <div class="form-group">
              <label class="form-label">Email (opcional, login alternativo)</label>
              <input type="email" class="form-input" id="pai-email" value="${escapeHTML(pai?.email || '')}" placeholder="responsavel@email.com">
            </div>
            <div class="form-group">
              <label class="form-label">Telefone (WhatsApp)</label>
              <input type="text" class="form-input" id="pai-telefone" value="${escapeHTML(pai?.telefone || '')}" placeholder="(61) 99999-9999">
            </div>
            <div class="form-group">
              <label class="form-label">${ehNovo ? 'Senha *' : 'Nova senha (deixe vazio para manter)'}</label>
              <input type="text" class="form-input" id="pai-senha" placeholder="${ehNovo ? 'Crie uma senha (mín. 4 caracteres)' : 'Deixe vazio para manter a atual'}">
              <small style="color:var(--pedra-500);font-size:12px;">Anote o usuário e a senha para passar ao responsável.</small>
            </div>
            <div id="alerta-pai"></div>
            <div class="modal-acoes">
              <button type="button" class="btn btn-secondary" id="cancelar-pai">Cancelar</button>
              <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    `,
    bind: () => {
      document.getElementById('modal-bg').onclick = fecharModal;
      document.getElementById('cancelar-pai').onclick = fecharModal;
      document.getElementById('form-pai').onsubmit = async e => {
        e.preventDefault();
        const nome = document.getElementById('pai-nome').value.trim();
        const usuario = document.getElementById('pai-usuario').value.trim().toLowerCase().replace(/\s+/g, '');
        const email = document.getElementById('pai-email').value.trim().toLowerCase();
        const telefone = document.getElementById('pai-telefone').value.trim();
        const senha = document.getElementById('pai-senha').value;
        const alerta = document.getElementById('alerta-pai');
        alerta.innerHTML = '';

        if (!nome || !usuario) {
          alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Preencha nome e usuário.</span></div>`;
          return;
        }
        if (usuario.length < 3) {
          alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Usuário precisa ter pelo menos 3 caracteres.</span></div>`;
          return;
        }
        if (ehNovo && (!senha || senha.length < 4)) {
          alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Crie uma senha com pelo menos 4 caracteres.</span></div>`;
          return;
        }
        if (senha && senha.length < 4) {
          alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>A senha precisa ter pelo menos 4 caracteres.</span></div>`;
          return;
        }
        const usuarioEmUso = State.pais.find(p => p.usuario === usuario && p.id !== pai?.id);
        if (usuarioEmUso) {
          alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Esse usuário já está em uso. Escolha outro.</span></div>`;
          return;
        }
        if (email) {
          // Valida formato básico de email
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>O email informado não parece válido. Verifique ou deixe em branco.</span></div>`;
            return;
          }
          const emailEmUso = State.pais.find(p => p.email === email && p.id !== pai?.id);
          if (emailEmUso) {
            alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Esse email já está em uso por outro responsável.</span></div>`;
            return;
          }
        }
        if (telefone) {
          // Conta só os dígitos. Brasil: 10 (fixo) ou 11 (celular) dígitos.
          const digitos = telefone.replace(/\D/g, '');
          if (digitos.length < 10 || digitos.length > 11) {
            alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>O telefone deve ter DDD + número (10 ou 11 dígitos). Ex: (61) 99999-9999.</span></div>`;
            return;
          }
        }

        try {
          if (ehNovo) {
            const novoPai = await API.criarPai({
              nome, usuario, email, telefone,
              senhaHash: hashSenha(senha)
            });
            State.pais.push(novoPai);
          } else {
            await API.atualizarPai(pai.id, {
              nome, usuario, email, telefone,
              senhaHash: senha ? hashSenha(senha) : null
            });
            pai.nome = nome;
            pai.usuario = usuario;
            pai.email = email;
            pai.telefone = telefone;
            if (senha) pai.senhaHash = hashSenha(senha);
          }
          fecharModal();
          render();
          mostrarToast(ehNovo ? 'Responsável cadastrado!' : 'Atualizado!');
        } catch (e) {
          alerta.innerHTML = `<div class="alert alert-erro">${Icons.alert}<span>Erro: ${escapeHTML(e.message)}</span></div>`;
        }
      };
    }
  };
  render();
}

/* ----------- PAINEL: ALUNOS ----------- */
function renderPainelAlunos() {
  const busca = State.buscaAlunosAdmin.toLowerCase();
  const filtrados = State.alunos.filter(a =>

    a.turma.toLowerCase().includes(busca)
  );

  const nomeResp = id => State.pais.find(p => p.id === id)?.nome || '—';
  const totalPedidos = id => State.pedidos.filter(p => p.alunoId === id && p.statusEntrega !== 'cancelado').length;
  const totalGasto = id => State.pedidos
    .filter(p => p.alunoId === id && p.statusPagamento === 'pago' && p.statusEntrega !== 'cancelado')
    .reduce((s,p) => s + p.total, 0);

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
      <div>
        <h1 class="page-titulo">Alunos</h1>

      </div>
      <button class="btn btn-primary" id="btn-novo-aluno">${Icons.plus} Novo aluno</button>
    </div>

    <div class="search-box">
      ${Icons.search}
      <input type="text" class="form-input" id="busca-alunos" placeholder="Buscar por nome ou turma..." value="${escapeHTML(State.buscaAlunosAdmin)}">
    </div>

    <div class="tabela-wrap">
  `;

  if (filtrados.length === 0) {
    html += `<p style="text-align:center;padding:40px;color:var(--pedra-500);">${State.alunos.length === 0 ? 'Nenhum aluno cadastrado.' : 'Nenhum resultado.'}</p>`;
  } else {
    html += `
      <table class="tabela">
        <thead>
          <tr>
            <th>Aluno</th>
            <th>Turma</th>
            <th>Responsável</th>
            <th class="text-right">Pedidos</th>
            <th class="text-right">Total pago</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
    `;
    filtrados.forEach(a => {
      html += `
        <tr>
          <td>
            <div style="font-weight:700;">${escapeHTML(a.nome)}</div>
            ${a.observacoesMedicas ? `<div class="tag-medica">⚠️ ${escapeHTML(a.observacoesMedicas)}</div>` : ''}
          </td>
          <td data-label="Turma">${escapeHTML(a.turma)}</td>
          <td data-label="Responsável" style="font-size:13px;">${escapeHTML(nomeResp(a.responsavelId))}</td>
          <td data-label="Pedidos" class="text-right num">${totalPedidos(a.id)}</td>
          <td data-label="Total pago" class="text-right vermelho">${formatBRL(totalGasto(a.id))}</td>
          <td class="text-right">
            <button class="btn btn-secondary btn-sm" data-edit-aluno="${a.id}">Editar</button>
            <button class="btn btn-icon" style="color:var(--vermelho);" data-del-aluno="${a.id}" aria-label="Excluir ${escapeHTML(a.nome)}" title="Excluir">${Icons.trash}</button>
          </td>
        </tr>
      `;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;
  return html;
}

  let html = `
    <h1 class="page-titulo">Calendário da semana</h1>
    <p class="page-subtitulo">Marque em quais dias cada lanche estará disponível. Os pais só veem o que está marcado para o dia.</p>

    <div class="aviso" style="margin-bottom:20px;">
      ${Icons.alert}
      <span><strong>Importante:</strong> o lanche só aparece para os pais nos dias que você marcar. Lanche <strong>sem nenhum dia marcado não aparece</strong> no cardápio.</span>
    </div>
  `;

  const produtos = State.produtos.filter(p => p.ativo);
  if (produtos.length === 0) {
    html += `<div class="empty">Cadastre produtos no Cardápio primeiro.</div>`;
    return html;
  }

  // ===== VERSÃO DESKTOP: tabela (escondida no mobile) =====
  html += `<div class="cal-desktop"><div class="tabela-wrap"><table class="tabela tabela-calendario"><thead><tr>
    <th style="min-width:160px;">Lanche</th>`;
  DIAS_SEMANA.forEach(d => {
    const hojeMarca = d.num === hoje ? ' style="color:var(--turquesa);"' : '';
    html += `<th style="text-align:center;"${hojeMarca}>${d.curto}${d.num === hoje ? ' •' : ''}</th>`;
  });
  html += `</tr></thead><tbody>`;

  produtos.forEach(p => {
    const semDias = !p.dias || p.dias.length === 0;
    html += `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;display:flex;">${iconeProduto(p, 'sm')}</span>
          <div>
            <div style="font-weight:600;">${escapeHTML(p.nome)}${p.ehCombo ? ' <span style="font-size:10px;background:var(--amarelo);color:#7c4a03;padding:1px 6px;border-radius:999px;font-weight:800;">COMBO</span>' : ''}</div>
            ${semDias ? '<div style="font-size:11px;color:var(--vermelho);font-weight:600;">⚠ Não aparece (sem dias marcados)</div>' : ''}
          </div>
        </div>
      </td>`;
    DIAS_SEMANA.forEach(d => {
      const marcado = p.dias && p.dias.includes(d.num);
      html += `<td style="text-align:center;">
        <input type="checkbox" class="chk-dia" data-produto="${p.id}" data-dia="${d.num}" ${marcado ? 'checked' : ''}
          aria-label="${escapeHTML(p.nome)} - ${d.nome}"
          style="width:20px;height:20px;accent-color:var(--turquesa);cursor:pointer;">
      </td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div></div>`;

  // ===== VERSÃO MOBILE: cards com pílulas de dia nomeadas (escondida no desktop) =====
  html += `<div class="cal-mobile">`;
  produtos.forEach(p => {
    const semDias = !p.dias || p.dias.length === 0;
    html += `
      <div class="cal-card ${semDias ? 'cal-card-vazio' : ''}">
        <div class="cal-card-head">
          <span style="font-size:26px;display:flex;">${iconeProduto(p, 'md')}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;">${escapeHTML(p.nome)}${p.ehCombo ? ' <span style="font-size:10px;background:var(--amarelo);color:#7c4a03;padding:1px 6px;border-radius:999px;font-weight:800;">COMBO</span>' : ''}</div>
            ${semDias ? '<div style="font-size:12px;color:var(--vermelho);font-weight:600;margin-top:2px;">⚠ Não aparece no cardápio</div>' : ''}
          </div>
        </div>
        <div class="cal-dias">`;
    DIAS_SEMANA.forEach(d => {
      const marcado = p.dias && p.dias.includes(d.num);
      const ehHoje = d.num === hoje;
      html += `
          <button type="button" class="cal-pilula ${marcado ? 'on' : ''} ${ehHoje ? 'hoje' : ''}"
            data-produto="${p.id}" data-dia="${d.num}"
            aria-label="${escapeHTML(p.nome)} - ${d.nome}" aria-pressed="${marcado ? 'true' : 'false'}">
            ${d.curto}
          </button>`;
    });
    html += `
        </div>
      </div>`;
  });
  html += `</div>`;

  html += `
    <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-secondary btn-sm" id="cal-marcar-todos">Marcar todos os dias em tudo</button>
      <button class="btn btn-secondary btn-sm" id="cal-limpar-todos">Desmarcar tudo</button>
    </div>
  `;
  return html;
}

function bindPainelCalendario() {
  // Função única que alterna um dia de um produto (usada por checkbox e pílula)
  async function alternarDia(produtoId, dia, ativar, elemento) {
    const produto = State.produtos.find(p => p.id === produtoId);
    if (!produto) return;

    let dias = Array.isArray(produto.dias) ? [...produto.dias] : [];
    if (ativar) {
      if (!dias.includes(dia)) dias.push(dia);
    } else {
      dias = dias.filter(d => d !== dia);
    }
    dias.sort();

    const diasAnterior = produto.dias;
    produto.dias = dias.length ? dias : null;
    if (elemento) elemento.disabled = true;
    try {
      await API.atualizarDiasProduto(produtoId, dias);
      render();
    } catch (e) {
      produto.dias = diasAnterior;
      if (elemento) elemento.disabled = false;
      render();
      alert('Não foi possível salvar. Verifique sua conexão e tente novamente.');
    }
  }

  // Desktop: checkboxes
  document.querySelectorAll('.chk-dia').forEach(chk => {
    chk.onchange = () => alternarDia(chk.dataset.produto, parseInt(chk.dataset.dia, 10), chk.checked, chk);
  });

  // Mobile: pílulas (toggle)
  document.querySelectorAll('.cal-pilula').forEach(btn => {
    btn.onclick = () => {
      const ativar = !btn.classList.contains('on');
      alternarDia(btn.dataset.produto, parseInt(btn.dataset.dia, 10), ativar, btn);
    };
  });

  document.getElementById('cal-marcar-todos')?.addEventListener('click', async () => {
    if (!confirm('Marcar TODOS os dias (seg a sex) em TODOS os lanches?')) return;
    try {
      for (const p of State.produtos.filter(x => x.ativo)) {
        await API.atualizarDiasProduto(p.id, [1,2,3,4,5]);
        p.dias = [1,2,3,4,5];
      }
      mostrarToast('Pronto!');
      render();
    } catch (e) { alert('Erro ao salvar: ' + e.message); }
  });

  document.getElementById('cal-limpar-todos')?.addEventListener('click', async () => {
    if (!confirm('Desmarcar todos os dias de todos os lanches?\n\nATENÇÃO: com nenhum dia marcado, os lanches NÃO vão aparecer no cardápio dos pais até você marcar os dias de novo.')) return;
    try {
      for (const p of State.produtos.filter(x => x.ativo)) {
        await API.atualizarDiasProduto(p.id, []);
        p.dias = null;
      }
      mostrarToast('Desmarcado!');
      render();
    } catch (e) { alert('Erro ao salvar: ' + e.message); }
  });
}

/* ----------- PAINEL: HISTÓRICO ----------- */
function renderPainelHistorico() {
  const dias = parseInt(State.periodoHistorico, 10);
  const limite = new Date();
  limite.setDate(limite.getDate() - dias);
  // Data local (mesmo critério do HOJE), evitando o desvio de UTC à noite
  const limiteISO = `${limite.getFullYear()}-${String(limite.getMonth()+1).padStart(2,'0')}-${String(limite.getDate()).padStart(2,'0')}`;

  const pedidosPeriodo = State.pedidos
    .filter(p => p.data >= limiteISO && p.statusEntrega !== 'cancelado')
    .sort((a,b) => b.criadoEm.localeCompare(a.criadoEm));

  const totalReceita = pedidosPeriodo.filter(p => p.statusPagamento === 'pago').reduce((s,p) => s + p.total, 0);
  const totalAReceber = pedidosPeriodo.filter(p => p.statusPagamento === 'pendente').reduce((s,p) => s + p.total, 0);

  // Itens vendidos
  const map = {};
  pedidosPeriodo.forEach(p => {
    p.itens.forEach(i => {
      if (!map[i.produtoId]) map[i.produtoId] = { ...i, quantidade: 0, faturamento: 0 };
      map[i.produtoId].quantidade += i.quantidade;
      map[i.produtoId].faturamento += i.preco * i.quantidade;
    });
  });
  const itensVendidos = Object.values(map).sort((a,b) => b.quantidade - a.quantidade);

  let html = `
    <h1 class="page-titulo">Histórico</h1>
    <p class="page-subtitulo">Resumo de vendas e produtos mais pedidos.</p>

    <div class="filtros">
      <button class="filtro-btn ${State.periodoHistorico === '1' ? 'ativo' : ''}" data-periodo="1">Hoje</button>
      <button class="filtro-btn ${State.periodoHistorico === '7' ? 'ativo' : ''}" data-periodo="7">7 dias</button>
      <button class="filtro-btn ${State.periodoHistorico === '30' ? 'ativo' : ''}" data-periodo="30">30 dias</button>
      <button class="filtro-btn ${State.periodoHistorico === '365' ? 'ativo' : ''}" data-periodo="365">1 ano</button>
    </div>

    <div class="card-info" style="grid-template-columns:1fr 1fr 1fr;">
      <div class="kpi kpi-verde">
        ${kpiIcon(Icons.shoppingBag)}
        <div class="kpi-label">Pedidos</div>
        <div class="kpi-valor">${pedidosPeriodo.length}</div>
      </div>
      <div class="kpi kpi-turquesa">
        ${kpiIcon(Icons.checkCircle)}
        <div class="kpi-label">Receita realizada</div>
        <div class="kpi-valor">${formatBRL(totalReceita)}</div>
      </div>
      <div class="kpi kpi-vermelho">
        ${kpiIcon(Icons.clock)}
        <div class="kpi-label">A receber</div>
        <div class="kpi-valor">${formatBRL(totalAReceber)}</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2 style="font-size:18px;font-weight:800;margin-bottom:14px;">Mais vendidos</h2>
  `;

  if (itensVendidos.length === 0) {
    html += `<p style="text-align:center;color:var(--pedra-500);padding:24px 0;">Sem dados no período.</p>`;
  } else {
    const max = itensVendidos[0].quantidade;
    itensVendidos.forEach((p, i) => {
      const pct = (p.quantidade / max) * 100;
      html += `
        <div class="barra-item">
          <div class="barra-info">
            <strong>${i+1}. ${p.emoji || '🍽️'} ${escapeHTML(p.nome)}</strong>
            <span>${p.quantidade} · <strong style="color:var(--verde);">${formatBRL(p.faturamento)}</strong></span>
          </div>
          <div class="barra-bar"><div class="barra-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    });
  }

  html += `
      </div>
      <div class="card">
        <h2 style="font-size:18px;font-weight:800;margin-bottom:14px;">Últimos pedidos</h2>
        <div style="max-height:500px;overflow-y:auto;">
  `;

  if (pedidosPeriodo.length === 0) {
    html += `<p style="text-align:center;color:var(--pedra-500);padding:24px 0;">Nada por aqui.</p>`;
  } else {
    pedidosPeriodo.slice(0, 30).forEach(p => {
      const aluno = State.alunos.find(a => a.id === p.alunoId);
      html += `
        <div style="padding:12px;background:var(--pedra-50);border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:14px;">${escapeHTML(aluno?.nome || '?')}</div>
            <div style="font-size:12px;color:var(--pedra-500);">${formatData(p.data)} · ${p.itens.length} item(s)</div>
          </div>
          <div style="text-align:right;">
            <div style="font-weight:800;color:var(--verde);">${formatBRL(p.total)}</div>
            ${badgePagamento(p.statusPagamento)}
          </div>
          <button class="btn-anular" data-anular="${p.id}" title="Anular este pedido" aria-label="Anular pedido"
            style="flex-shrink:0;width:34px;height:34px;border-radius:9px;background:var(--vermelho-claro);color:var(--vermelho);display:grid;place-items:center;transition:all 0.2s;">
            ${Icons.trash || '✕'}
          </button>
        </div>
      `;
    });
  }

  html += `</div></div></div>`;
  return html;
}

function bindPainelHistorico() {
  document.querySelectorAll('[data-periodo]').forEach(b => {
    b.onclick = () => {
      State.periodoHistorico = b.dataset.periodo;
      render();
    };
  });
  document.querySelectorAll('[data-anular]').forEach(b => {
    b.onclick = async () => {
      if (b.dataset.processando === '1') return;
      const id = b.dataset.anular;
      const pedido = State.pedidos.find(p => p.id === id);
      const aluno = State.alunos.find(a => a.id === pedido?.alunoId);
      const ok = confirm(`Anular o pedido de ${aluno?.nome || 'aluno'} (${formatBRL(pedido?.total || 0)})?\n\nEle vai sumir dos relatórios, mas continua registrado. Use isso para remover pedidos de teste ou feitos por engano.`);
      if (!ok) return;
      b.dataset.processando = '1';
      b.disabled = true;
      b.style.opacity = '0.5';
      try {
        await API.atualizarPedido(id, { statusEntrega: 'cancelado' });
        if (pedido) pedido.statusEntrega = 'cancelado';
        mostrarToast('Pedido anulado.');
        render();
      } catch (e) {
        b.dataset.processando = '0';
        b.disabled = false;
        b.style.opacity = '1';
        alert('Não foi possível anular. Verifique sua conexão e tente novamente.\n\nDetalhe: ' + e.message);
      }
    };
  });
}

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  // Mostra tela de carregando
  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:linear-gradient(180deg, #E8F7F9 0%, #ffffff 100%);">
      <img src="data:image/jpeg;base64,${CONFIG.LOGO_BASE64}" style="height:90px;" alt="CDA">
      <div style="font-family:'Fraunces',serif;color:#26B7C9;font-size:22px;font-weight:700;">Carregando...</div>
    </div>
  `;

  if (!inicializarSupabase()) return;

  // Verifica se já existe uma sessão Auth ativa (pai voltou sem ter feito logout)
  const { data: { session } } = await db.auth.getSession();

  if (session?.user) {
    // Sessão Auth ativa: carrega só os dados deste pai e entra direto
    try {
      await carregarTudo(); // produtos e dados globais
      const pai = await carregarDadosPai(session.user.id);
      if (pai) {
        State.sessao = { tipo: 'pai', userId: pai.id, authUserId: session.user.id };
        State.tela = 'app';
        ativarRealtime();
        render();
        return;
      }
    } catch (e) {
      // Se falhar (ex: auth_user_id não encontrado na tabela pais ainda),
      // desfaz a sessão e vai pra tela de login normalmente
      await db.auth.signOut();
    }
  }

  // Sem sessão ativa ou sessão inválida: carrega tudo e vai pra login
  await carregarTudo();
  ativarRealtime();

  // A: avisa antes de fechar/atualizar a página com itens no carrinho não reservados
  window.addEventListener('beforeunload', (e) => {
    const temCarrinho = Object.values(State.carrinho || {}).some(q => q > 0);
    if (State.sessao?.tipo === 'pai' && temCarrinho && State.pedidoEtapa !== 'sucesso') {
      e.preventDefault();
      e.returnValue = ''; // exigido pelos navegadores para mostrar o aviso
    }
  });

  State.tela = 'login';
  render();
});
</script>
